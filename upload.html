<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>174. | System Director</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: 'rgb(255 255 255)',       
                        surface: 'rgb(244 244 245)',    
                        ink: 'rgb(9 9 11)',             
                        inkdim: 'rgb(113 113 122)',     
                        line: 'rgb(228 228 231)',       
                        error: 'rgb(220 38 38)',
                        success: 'rgb(34 197 94)',
                        warn: 'rgb(234 179 8)'
                    },
                    fontFamily: {
                        times: ['"Times New Roman"', 'Times', 'serif'],
                        serif: ['Lora', 'serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    animation: {
                        'blink': 'blink 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        blink: { '0%, 100%': { opacity: '1' }, '50%': { opacity: '0.3' } }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: rgb(9 9 11); color: rgb(244 244 245); -webkit-font-smoothing: antialiased; }
        .input-sleek { background: rgba(24, 24, 27, 0.5); border: 1px solid rgb(113 113 122 / 0.3); transition: all 0.2s ease-out; color: white; }
        .input-sleek:focus { outline: none; border-color: rgb(244 244 245); box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        .drop-zone { border: 2px dashed rgb(113 113 122 / 0.5); transition: all 0.3s ease; }
        .drop-zone.dragover { border-color: rgb(244 244 245); background: rgba(255,255,255,0.05); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgb(113 113 122); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-mono selection:bg-white selection:text-black relative overflow-x-hidden p-4 md:p-6">

    <div class="absolute inset-0 bg-[radial-gradient(rgb(113_113_122)_1px,transparent_1px)] [background-size:24px_24px] opacity-10 pointer-events-none"></div>

    <!-- === MAIN APP === -->
    <div class="max-w-7xl mx-auto w-full relative z-10 flex flex-col flex-grow gap-4 h-full">
        
        <!-- Header -->
        <header class="border-b border-zinc-800 pb-4 flex justify-between items-end shrink-0">
            <div>
                <span class="text-[10px] text-success tracking-widest uppercase font-bold flex items-center gap-2 mb-2">
                    <span id="sys-status-dot" class="w-2 h-2 bg-success rounded-full animate-blink"></span>
                    <span id="sys-status-text">SYS_DIRECTOR_ACTIVE</span>
                </span>
                <h1 class="font-serif text-2xl md:text-3xl font-bold text-white tracking-tight">Archive Director.</h1>
            </div>
            <div class="flex items-center gap-4">
                <div class="font-times text-2xl italic text-zinc-500">174.</div>
            </div>
        </header>

        <main class="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-4 h-[calc(100vh-140px)] min-h-[600px]">
            
            <!-- PANEL 1: EXPLORER (BACA & HAPUS) -->
            <div class="lg:col-span-4 flex flex-col bg-zinc-900/40 border border-zinc-800 rounded-2xl backdrop-blur-sm overflow-hidden">
                <div class="p-3 border-b border-zinc-800 bg-zinc-900/80 flex justify-between items-center shrink-0">
                    <h2 class="text-[10px] text-zinc-400 uppercase tracking-widest font-bold flex items-center gap-2">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
                        Repository Tree
                    </h2>
                    <div class="flex gap-2">
                        <button onclick="promptCreateFolder()" title="New Folder" class="p-1.5 hover:bg-zinc-800 rounded text-zinc-400 hover:text-white transition-colors">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"></path></svg>
                        </button>
                        <button onclick="loadExplorer()" title="Refresh" class="p-1.5 hover:bg-zinc-800 rounded text-zinc-400 hover:text-white transition-colors">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        </button>
                    </div>
                </div>
                
                <div class="p-2 border-b border-zinc-800 shrink-0 flex items-center gap-2 text-[9px] font-mono text-zinc-500 overflow-x-auto custom-scrollbar">
                    <button onclick="loadExplorer('')" class="hover:text-white shrink-0">root</button>
                    <span id="breadcrumb" class="flex items-center gap-2 shrink-0"></span>
                </div>

                <div id="explorer-list" class="flex-grow overflow-y-auto p-2 space-y-1 custom-scrollbar">
                    <!-- File tree injected here -->
                    <div class="text-[10px] text-zinc-600 p-2">Loading repository data...</div>
                </div>
            </div>

            <!-- PANEL 2: EDITOR & UPLOADER (BUAT & EDIT) -->
            <div class="lg:col-span-8 flex flex-col gap-4">
                
                <!-- Target Vector Info -->
                <div class="bg-zinc-900/40 border border-zinc-800 p-4 rounded-2xl backdrop-blur-sm shrink-0 flex gap-4 items-end">
                    <div class="flex-grow">
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Target Path / Filename</label>
                        <input type="text" id="target-path" placeholder="e.g. kuis/SEMESTER_1_Logic.html" class="w-full input-sleek rounded-lg px-3 py-2 text-xs text-white">
                        <input type="hidden" id="current-sha" value=""> <!-- Simpan SHA untuk Edit file -->
                    </div>
                    <button onclick="prepareNewFile()" class="shrink-0 bg-zinc-800 hover:bg-zinc-700 text-white border border-zinc-700 rounded-lg px-4 py-2 text-[10px] font-bold uppercase tracking-widest transition-colors h-[34px]">
                        + New File
                    </button>
                </div>

                <!-- Editor Tabs -->
                <div class="bg-zinc-900/40 border border-zinc-800 rounded-2xl backdrop-blur-sm flex-grow flex flex-col overflow-hidden">
                    <div class="flex border-b border-zinc-800 shrink-0">
                        <button id="tab-editor" onclick="switchTab('editor')" class="flex-1 py-3 text-[10px] uppercase tracking-widest font-bold bg-zinc-800 text-white border-b-2 border-white transition-all">Raw Editor</button>
                        <button id="tab-upload" onclick="switchTab('upload')" class="flex-1 py-3 text-[10px] uppercase tracking-widest font-bold text-zinc-500 hover:text-white transition-all">File Uploader</button>
                    </div>

                    <!-- Editor Content -->
                    <div id="view-editor" class="flex-grow flex flex-col p-0 relative">
                        <textarea id="raw-content" placeholder="// Paste code here or select a file from explorer to edit..." class="w-full h-full bg-transparent border-none p-4 text-[11px] font-mono custom-scrollbar resize-none outline-none text-zinc-300"></textarea>
                    </div>

                    <!-- Uploader Content -->
                    <div id="view-upload" class="flex-grow flex-col p-6 hidden items-center justify-center">
                        <div id="drop-zone" class="drop-zone w-full h-full rounded-xl flex flex-col items-center justify-center text-center cursor-pointer group" onclick="document.getElementById('file-input').click()">
                            <svg class="w-10 h-10 text-zinc-600 group-hover:text-white transition-colors mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                            </svg>
                            <span id="file-name-display" class="text-sm text-zinc-300 font-bold mb-1">Drop binary/media file here</span>
                            <span class="text-[10px] text-zinc-500">Maximum size 20MB (GitHub Limit)</span>
                            <input type="file" id="file-input" class="hidden" onchange="handleFileSelect(event)">
                        </div>
                    </div>
                </div>

                <!-- Action Bar & Terminal -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 shrink-0">
                    <div class="bg-zinc-900/40 border border-zinc-800 p-4 rounded-2xl backdrop-blur-sm">
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Commit Message</label>
                        <input type="text" id="commit-msg" placeholder="e.g. Update content via System Director" class="w-full input-sleek rounded-lg px-3 py-2 text-xs mb-3">
                        
                        <label class="block text-[9px] text-zinc-500 uppercase tracking-widest mb-1">Commit Identity</label>
                        <select id="commit-identity" class="w-full input-sleek rounded-lg px-2 py-2 text-xs mb-3 outline-none">
                            <option value="system">System Default (Token Owner)</option>
                            <option value="yaeon">Sir Yaeon (Ghost Protocol)</option>
                        </select>

                        <div class="flex gap-2">
                            <button id="btn-deploy" onclick="deployData()" class="flex-grow bg-white text-black font-bold uppercase tracking-widest text-[10px] py-3 rounded-xl hover:bg-zinc-200 transition-all shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                                COMMIT & PUSH
                            </button>
                            <button id="btn-delete" onclick="deleteData()" class="hidden px-4 bg-error/10 text-error border border-error/30 font-bold uppercase tracking-widest text-[10px] py-3 rounded-xl hover:bg-error hover:text-white transition-all">
                                DELETE
                            </button>
                        </div>
                    </div>

                    <div class="bg-black border border-zinc-800 rounded-2xl p-3 flex flex-col overflow-hidden h-full">
                        <span class="text-[8px] text-zinc-600 uppercase tracking-widest border-b border-zinc-800 pb-1 mb-2 block shrink-0">Terminal Log</span>
                        <ul id="terminal-logs" class="text-[9px] text-zinc-400 space-y-1 overflow-y-auto custom-scrollbar flex-grow pr-2">
                            <li>> Awaiting command...</li>
                        </ul>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- === SYSTEM LOGIC === -->
    <script>
        // -- STATE --
        let currentDir = '';
        let selectedFileForUpload = null;

        window.onload = () => {
            log("System initialized. Bridging to local /api/content...", "success");
            loadExplorer('');
        };

        // -- EXPLORER (READ VIA API) --
        async function loadExplorer(path = '') {
            try {
                currentDir = path;
                updateBreadcrumb();
                const listEl = document.getElementById('explorer-list');
                listEl.innerHTML = `<div class="text-[10px] text-zinc-500 p-2 animate-pulse">Scanning sector via API...</div>`;
                
                // Fetch direct ke backend Vercel tanpa token (tiru index.html)
                const res = await fetch(`/api/content?folder=${path}`);
                
                if(res.status === 404) {
                    listEl.innerHTML = `<div class="text-[10px] text-zinc-500 p-2">Empty directory.</div>`;
                    return;
                }
                if(!res.ok) throw new Error(`HTTP ${res.status}`);
                
                const data = await res.json();
                
                const items = Array.isArray(data) ? data : [data];
                items.sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'dir' ? -1 : 1;
                });

                listEl.innerHTML = '';
                
                if(path !== '') {
                    const parentPath = path.split('/').slice(0, -1).join('/');
                    const btn = document.createElement('div');
                    btn.className = "flex items-center gap-2 p-2 hover:bg-zinc-800 rounded-lg cursor-pointer text-[10px] text-zinc-400 group transition-colors";
                    btn.innerHTML = `<svg class="w-4 h-4 text-zinc-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 17l-5-5m0 0l5-5m-5 5h12"></path></svg> <span>.. (Go Back)</span>`;
                    btn.onclick = () => loadExplorer(parentPath);
                    listEl.appendChild(btn);
                }

                items.forEach(item => {
                    if (item.name === '.gitkeep') return; 

                    const isDir = item.type === 'dir';
                    const icon = isDir 
                        ? `<svg class="w-4 h-4 text-yellow-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h5l2 2h5a2 2 0 012 2v6a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"></path></svg>`
                        : `<svg class="w-4 h-4 text-zinc-400 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`;

                    const el = document.createElement('div');
                    el.className = `flex items-center justify-between p-2 hover:bg-zinc-800 rounded-lg cursor-pointer text-[10px] text-zinc-300 group transition-colors border border-transparent hover:border-zinc-700`;
                    el.innerHTML = `
                        <div class="flex items-center gap-2 truncate">
                            ${icon}
                            <span class="truncate">${item.name}</span>
                        </div>
                    `;
                    
                    if (isDir) {
                        el.onclick = () => loadExplorer(item.path);
                    } else {
                        el.onclick = () => loadFileForEdit(item.path, item.sha);
                    }
                    
                    listEl.appendChild(el);
                });

            } catch(e) {
                log(`Explorer Error: ${e.message}`, "error");
            }
        }

        function updateBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            if(!currentDir) { bc.innerHTML = ''; return; }
            const parts = currentDir.split('/');
            let html = '';
            let buildPath = '';
            parts.forEach((p, i) => {
                buildPath += (i===0 ? p : '/'+p);
                const pathStr = buildPath;
                html += ` / <button onclick="loadExplorer('${pathStr}')" class="hover:text-white truncate max-w-[100px]">${p}</button>`;
            });
            bc.innerHTML = html;
        }

        // -- FILE EDITOR LOGIC --
        async function loadFileForEdit(filePath, sha) {
            try {
                log(`Retrieving vector: ${filePath}...`, "info");
                document.getElementById('target-path').value = filePath;
                document.getElementById('current-sha').value = sha;
                document.getElementById('btn-delete').classList.remove('hidden'); 
                document.getElementById('commit-msg').value = `Update ${filePath.split('/').pop()}`;

                // Fetch raw content dari API
                const res = await fetch(`/api/content?file=${filePath}`);
                if(!res.ok) throw new Error(`HTTP ${res.status}`);
                const data = await res.json();
                
                // Decode Base64 (Handling Unicode safe)
                const decodedStr = decodeURIComponent(escape(atob(data.content)));
                
                document.getElementById('raw-content').value = decodedStr;
                switchTab('editor');
                log(`Payload loaded into editor.`, "success");

            } catch (e) {
                log(`Failed to load file: ${e.message}`, "error");
            }
        }

        function prepareNewFile() {
            document.getElementById('target-path').value = currentDir ? `${currentDir}/new_file.html` : `new_file.html`;
            document.getElementById('current-sha').value = '';
            document.getElementById('raw-content').value = '';
            document.getElementById('btn-delete').classList.add('hidden');
            document.getElementById('commit-msg').value = `Add new file`;
            switchTab('editor');
            log("Editor cleared for new payload.", "info");
        }

        function promptCreateFolder() {
            const folderName = prompt("Enter new folder name:");
            if(folderName && folderName.trim() !== "") {
                const sanitized = folderName.trim().replace(/[^a-zA-Z0-9-_ ]/g, "");
                const targetPath = currentDir ? `${currentDir}/${sanitized}/.gitkeep` : `${sanitized}/.gitkeep`;
                
                document.getElementById('target-path').value = targetPath;
                document.getElementById('current-sha').value = '';
                document.getElementById('raw-content').value = 'Directory placeholder created by System Director.';
                document.getElementById('commit-msg').value = `Create directory: ${sanitized}`;
                
                log(`Ready to create directory. Click COMMIT to finalize.`, "warn");
            }
        }

        // -- UPLOADER LOGIC --
        function switchTab(tab) {
            const editorTab = document.getElementById('tab-editor');
            const uploadTab = document.getElementById('tab-upload');
            const viewEditor = document.getElementById('view-editor');
            const viewUpload = document.getElementById('view-upload');

            if(tab === 'editor') {
                editorTab.className = "flex-1 py-3 text-[10px] uppercase tracking-widest font-bold bg-zinc-800 text-white border-b-2 border-white transition-all";
                uploadTab.className = "flex-1 py-3 text-[10px] uppercase tracking-widest font-bold text-zinc-500 hover:text-white transition-all bg-transparent border-b-2 border-transparent";
                viewEditor.classList.remove('hidden'); viewEditor.classList.add('flex');
                viewUpload.classList.add('hidden'); viewUpload.classList.remove('flex');
                selectedFileForUpload = null; 
            } else {
                uploadTab.className = "flex-1 py-3 text-[10px] uppercase tracking-widest font-bold bg-zinc-800 text-white border-b-2 border-white transition-all";
                editorTab.className = "flex-1 py-3 text-[10px] uppercase tracking-widest font-bold text-zinc-500 hover:text-white transition-all bg-transparent border-b-2 border-transparent";
                viewUpload.classList.remove('hidden'); viewUpload.classList.add('flex');
                viewEditor.classList.add('hidden'); viewEditor.classList.remove('flex');
            }
        }

        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault(); dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFileSelect({ target: { files: e.dataTransfer.files } });
        });

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                selectedFileForUpload = file;
                document.getElementById('file-name-display').innerHTML = `<span class="text-white">${file.name}</span> <br><span class="text-zinc-500 text-[10px]">${(file.size / 1024).toFixed(1)} KB</span>`;
                
                const tPath = document.getElementById('target-path');
                let pathArr = tPath.value.split('/');
                pathArr.pop(); 
                pathArr.push(file.name);
                tPath.value = pathArr.join('/') || file.name;
                
                document.getElementById('current-sha').value = ''; 
                checkExistingSha(tPath.value);

                document.getElementById('commit-msg').value = `Upload binary: ${file.name}`;
                log(`Binary media loaded into dropzone: ${file.name}`, "info");
            }
        }

        async function checkExistingSha(path) {
            try {
                const res = await fetch(`/api/content?file=${path}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('current-sha').value = data.sha;
                    document.getElementById('btn-delete').classList.remove('hidden');
                    log(`Warning: File already exists. Commit will overwrite it.`, "warn");
                }
            } catch(e) {} 
        }

        // -- DEPLOY (CREATE/UPDATE) LOGIC --
        async function deployData() {
            const path = document.getElementById('target-path').value.trim();
            const message = document.getElementById('commit-msg').value.trim() || `System Director Commit`;
            const sha = document.getElementById('current-sha').value.trim();
            const identity = document.getElementById('commit-identity').value;
            const btn = document.getElementById('btn-deploy');

            if (!path) { log("Error: Target path is empty.", "error"); return; }

            btn.disabled = true;
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = `TRANSMITTING...`;

            try {
                let base64Content = "";

                if (selectedFileForUpload) {
                    base64Content = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = e => resolve(e.target.result.split(',')[1]);
                        reader.onerror = error => reject(error);
                        reader.readAsDataURL(selectedFileForUpload);
                    });
                } else {
                    const textContent = document.getElementById('raw-content').value;
                    base64Content = btoa(unescape(encodeURIComponent(textContent)));
                }

                // Identitas Kustom: Dikirim ke Backend Vercel
                const authorData = identity === 'yaeon' ? { name: 'Sir Yaeon', email: 'yaeon@archive174.local' } : null;

                const payload = { 
                    action: sha ? 'update' : 'create',
                    path: path,
                    message: message, 
                    content: base64Content,
                    sha: sha,
                    author: authorData
                };

                log(`Pushing payload to /api/content for vector: ${path}...`, "warn");
                
                // POST ke Vercel endpoint
                const res = await fetch('/api/content', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if(!res.ok) throw new Error(await res.text());
                const data = await res.json();

                log(`[SUCCESS] Payload integrated into Archive!`, "success");
                
                document.getElementById('current-sha').value = data.sha || sha;
                document.getElementById('btn-delete').classList.remove('hidden');
                
                const fileDir = path.split('/').slice(0, -1).join('/');
                if(fileDir === currentDir || fileDir === '') loadExplorer(currentDir);

            } catch(e) {
                log(`Deploy Failed: ${e.message}`, "error");
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalBtnText;
            }
        }

        // -- DELETE LOGIC --
        async function deleteData() {
            const path = document.getElementById('target-path').value.trim();
            const sha = document.getElementById('current-sha').value.trim();
            const identity = document.getElementById('commit-identity').value;
            const message = `Deleted via System Director: ${path}`;
            
            if(!sha) { log("Error: No SHA found for deletion.", "error"); return; }
            if(!confirm(`WARNING: Are you sure you want to permanently delete '${path}' from the archive?`)) return;

            try {
                log(`Executing delete protocol via API for: ${path}...`, "warn");
                
                const authorData = identity === 'yaeon' ? { name: 'Sir Yaeon', email: 'yaeon@archive174.local' } : null;
                
                const res = await fetch('/api/content', {
                    method: 'DELETE', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'delete', path, sha, message, author: authorData })
                });
                
                if(res.ok) {
                    log(`[SUCCESS] File eradicated from server.`, "success");
                    prepareNewFile(); 
                    loadExplorer(currentDir); 
                } else {
                    throw new Error(await res.text());
                }
            } catch(e) {
                log(`Delete Failed: ${e.message}`, "error");
            }
        }

        // -- LOGGER --
        function log(msg, type = 'info') {
            const logs = document.getElementById('terminal-logs');
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            let color = 'text-zinc-400';
            if (type === 'error') color = 'text-error';
            if (type === 'success') color = 'text-success';
            if (type === 'warn') color = 'text-warn';

            logs.innerHTML += `<li class="${color}"><span class="text-zinc-600">[${time}]</span> ${msg}</li>`;
            logs.scrollTop = logs.scrollHeight;
        }

        // Auto Resize Textarea logic (Optional refinement)
        document.getElementById('raw-content').addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = this.selectionStart;
                const end = this.selectionEnd;
                this.value = this.value.substring(0, start) + "    " + this.value.substring(end);
                this.selectionStart = this.selectionEnd = start + 4;
            }
        });
    </script>
</body>
</html>
