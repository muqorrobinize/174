<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISIOLOGI ARVENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --life-force-bg: #1a0000;
            --life-force-red: #990000;
            --life-force-crimson: #cc2200;
            --life-force-orange: #ff4500;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--life-force-bg);
            color: #f8f8f8;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Gradient Mesh Animation */
        .gradient-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, var(--life-force-red) 0%, transparent 45%),
                        radial-gradient(circle at 90% 80%, var(--life-force-crimson) 0%, transparent 45%),
                        radial-gradient(circle at 50% 50%, #4a0000 0%, transparent 50%),
                        radial-gradient(circle at 80% 10%, var(--life-force-orange) 0%, transparent 35%);
            background-size: 200% 200%;
            animation: meshMove 12s ease infinite alternate;
        }

        @keyframes meshMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .floating-icon {
            position: absolute;
            font-size: 4rem;
            opacity: 0.08;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .title-doctor {
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .musthofa-style { background: linear-gradient(90deg, #cc2200, transparent); border-left: 6px solid #fff; }
        .susi-style { background: linear-gradient(270deg, #0066cc, transparent); border-right: 6px solid #fff; text-align: right; width: 100%; }

        /* Flashcard Logic */
        .card-container { perspective: 1200px; }
        .card {
            width: 100%; height: 420px;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px; border-radius: 24px;
        }
        .card-back { transform: rotateY(180deg); background: rgba(20, 0, 0, 0.8); border: 2px solid var(--life-force-orange); }

        .btn-active { background: var(--life-force-crimson) !important; color: white !important; box-shadow: 0 0 20px rgba(204, 34, 0, 0.4); }

        .nav-return {
            position: fixed;
            top: 25px; left: 25px;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .nav-return:hover { transform: translateX(-5px); filter: brightness(1.2); }

        .citation-tag {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
            margin-top: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="gradient-mesh"></div>

    <!-- Floating Background Icons -->
    <div class="floating-icon" style="top: 10%; left: 5%;">🫀</div>
    <div class="floating-icon" style="top: 60%; left: 85%; animation-delay: 3s;">🫁</div>
    <div class="floating-icon" style="top: 80%; left: 15%; animation-delay: 6s;">🩸</div>
    <div class="floating-icon" style="top: 30%; left: 75%; animation-delay: 1s;">🩺</div>

    <!-- Return Button -->
    <div id="return-btn" class="nav-return hidden" onclick="goHome()">
        <div class="glass p-3 flex items-center space-x-3 cursor-pointer">
            <i data-lucide="chevron-left" class="w-6 h-6 text-white"></i>
            <span class="text-xs font-black uppercase tracking-widest">Menu Utama</span>
        </div>
    </div>

    <div class="container mx-auto px-4 py-16 relative z-10 min-h-screen">
        <!-- Main Landing -->
        <div id="landing-view">
            <header class="text-center mb-20 animate-in fade-in zoom-in duration-700">
                <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter text-white drop-shadow-2xl">FISIOLOGI ARVENA</h1>
                <div class="w-32 h-1 bg-gradient-to-r from-transparent via-red-500 to-transparent mx-auto mb-4"></div>
                <p class="text-gray-400 font-bold uppercase tracking-[0.4em] text-xs">Medical Cardiorespiratory Hub</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto">
                <div onclick="showView('ringkasan')" class="glass p-12 cursor-pointer hover:bg-white/10 transition group text-center border-b-4 border-red-600">
                    <i data-lucide="book-open-check" class="w-12 h-12 mx-auto mb-6 opacity-40 group-hover:opacity-100 transition duration-500"></i>
                    <h3 class="text-3xl font-black mb-3 uppercase tracking-tight">Ringkasan</h3>
                    <p class="text-[10px] opacity-30 uppercase font-bold tracking-widest">Core Medical Theory</p>
                </div>
                <div onclick="showView('kuis')" class="glass p-12 cursor-pointer hover:bg-white/10 transition group text-center border-b-4 border-crimson-600">
                    <i data-lucide="brain" class="w-12 h-12 mx-auto mb-6 opacity-40 group-hover:opacity-100 transition duration-500"></i>
                    <h3 class="text-3xl font-black mb-3 uppercase tracking-tight">Kuis</h3>
                    <p class="text-[10px] opacity-30 uppercase font-bold tracking-widest">Knowledge Testing</p>
                </div>
                <div onclick="showView('training')" class="glass p-12 cursor-pointer hover:bg-white/10 transition group text-center border-b-4 border-orange-600">
                    <i data-lucide="zap" class="w-12 h-12 mx-auto mb-6 opacity-40 group-hover:opacity-100 transition duration-500"></i>
                    <h3 class="text-3xl font-black mb-3 uppercase tracking-tight">Training</h3>
                    <p class="text-[10px] opacity-30 uppercase font-bold tracking-widest">Real-time Feedback</p>
                </div>
            </div>
        </div>

        <!-- Dynamic Content -->
        <div id="dynamic-content" class="hidden"></div>
    </div>

    <script>
        // --- DATASET 60 SOAL UNIK ---
        const questionPool = [
            // KELISTRIKAN & MEKANISME JANTUNG (1-20)
            { q: "Apa inisiator kelistrikan utama jantung yang normal dan berapa ritme intrinsiknya?", a: "Sinoatrial (SA) Node (80-100 bpm)", desc: "SA Node berfungsi sebagai pacemaker primer karena laju depolarisasi spontan tertinggi (80-100 denyut/menit). Jika gagal, AV Node akan mengambil alih.", options: ["SA Node (80-100 bpm)", "AV Node (40-60 bpm)", "Bundle of His (20-40 bpm)", "Purkinje (15-30 bpm)", "Bachmann Bundle (60-80 bpm)"], source: "PPT 6, 12 - Fungsi Kelistrikan Jantung" },
            { q: "Bagian manakah dari sistem konduksi yang menunda impuls agar ventrikel terisi darah secara penuh sebelum kontraksi?", a: "Atrioventrikular (AV) Node", desc: "AV Node berfungsi menunda konduksi impuls dari atrium ke ventrikel (sekitar 0.1 detik) guna memberikan waktu bagi ventrikel terisi penuh oleh darah.", options: ["SA Node", "Serabut Purkinje", "Bundle of His", "Atrioventrikular (AV) Node", "Tractus Internodal"], source: "PPT 6, 12 - Fungsi Kelistrikan Jantung" },
            { q: "Gelombang P pada Elektrokardiogram (EKG) merepresentasikan peristiwa fisiologis apa?", a: "Depolarisasi Atrium", desc: "Gelombang P menandakan proses depolarisasi otot atrium yang segera diikuti oleh kontraksi atrium.", options: ["Repolarisasi Ventrikel", "Depolarisasi Atrium", "Depolarisasi Ventrikel", "Repolarisasi Atrium", "Kontraksi Isovolumetrik"], source: "PPT 6, 12 - Fungsi Kelistrikan Jantung" },
            { q: "Kompleks QRS pada EKG merupakan indikator kelistrikan dari...", a: "Depolarisasi Ventrikel", desc: "Kompleks QRS mencerminkan depolarisasi ventrikel yang masif karena massa otot ventrikel yang besar, menutupi repolarisasi atrium.", options: ["Repolarisasi Ventrikel", "Depolarisasi Ventrikel", "Depolarisasi Atrium", "Relaksasi Ventrikel", "Jeda AV Node"], source: "PPT 6, 12 - Fungsi Kelistrikan Jantung" },
            { q: "Stimulasi saraf simpatis pada jantung akan melepaskan Norepinefrin yang memiliki efek utama berupa?", a: "Meningkatkan denyut jantung dan kekuatan kontraksi", desc: "Norepinefrin memperpendek waktu repolarisasi dan mempercepat depolarisasi spontan, meningkatkan Heart Rate dan Stroke Volume.", options: ["Menurunkan denyut jantung", "Memperlambat konduksi AV Node", "Meningkatkan denyut jantung dan kekuatan kontraksi", "Menyebabkan vasodilatasi koroner saja", "Menurunkan Cardiac Output"], source: "PPT 6, 12 - Fungsi Kelistrikan Jantung" },
            { q: "Refleks Bainbridge pada jantung merespons terhadap peningkatan apa?", a: "Volume cairan dan peregangan atrium kanan", desc: "Refleks Bainbridge (Atrial reflex) dipicu oleh peningkatan Aliran Balik Vena (Venous Return) yang meregangkan atrium kanan, mempercepat denyut jantung.", options: ["Tekanan parsial Oksigen", "Tekanan Darah Aorta", "Volume cairan dan peregangan atrium kanan", "Penurunan pH darah", "Kadar kalsium intraseluler"], source: "PPT 6, 12 - Fungsi Kelistrikan Jantung" },
            { q: "Secara mekanis, bunyi jantung pertama ('Lubb' / S1) diakibatkan oleh peristiwa apa?", a: "Penutupan katup Atrioventrikular (Mitral & Trikuspid)", desc: "Bunyi S1 terjadi persis pada permulaan fase Sistol Ventrikel, mencegah aliran balik darah ke atrium.", options: ["Penutupan katup Atrioventrikular (Mitral & Trikuspid)", "Penutupan katup Semilunar (Aorta & Pulmonal)", "Pembukaan mendadak katup Aorta", "Fase relaksasi isovolumetrik", "Aliran deras ke ventrikel saat diastol"], source: "PPT 1 - Mekanisme Kerja Jantung" },
            { q: "Bunyi jantung kedua ('Dupp' / S2) menandakan akhir dari sistol ventrikel, yang disebabkan oleh?", a: "Penutupan katup Semilunar (Aorta & Pulmonal)", desc: "S2 terjadi ketika tekanan ventrikel turun di bawah tekanan aorta/arteri pulmonalis, menutup katup semilunar.", options: ["Pembukaan katup Atrioventrikular", "Penutupan katup Semilunar (Aorta & Pulmonal)", "Kontraksi Atrium", "Relaksasi Atrium", "Penutupan katup Bikuspidalis"], source: "PPT 1 - Mekanisme Kerja Jantung" },
            { q: "Fase di mana tekanan ventrikel meningkat drastis tapi semua katup jantung tertutup rapat disebut?", a: "Kontraksi Isovolumetrik", desc: "Fase kontraksi isovolumetrik terjadi setelah katup AV menutup namun tekanan belum cukup tinggi untuk membuka katup semilunar. Volume tetap.", options: ["Relaksasi Isovolumetrik", "Ejeksi Ventrikel Cepat", "Kontraksi Isovolumetrik", "Pengisian Ventrikel Pasif", "Sistol Atrium"], source: "PPT 1 - Mekanisme Kerja Jantung" },
            { q: "Curah Jantung (Cardiac Output / CO) dihitung menggunakan rumus apa?", a: "Heart Rate (HR) x Stroke Volume (SV)", desc: "CO adalah total darah yang dipompa jantung per menit, merupakan perkalian dari denyut per menit dengan volume per denyut.", options: ["Heart Rate (HR) x Stroke Volume (SV)", "End Diastolic Volume - End Systolic Volume", "Tekanan Sistolik / Tekanan Diastolik", "Preload x Afterload", "Stroke Volume / End Diastolic Volume"], source: "PPT 1 - Mekanisme Kerja Jantung" },
            { q: "Sesuai Hukum Frank-Starling, semakin besar pengisian darah ke ventrikel saat diastol (Preload), maka...", a: "Stroke Volume akan meningkat karena regangan otot jantung yang optimal", desc: "Hukum Starling: jantung memompa darah yang kembali kepadanya. Peningkatan EDV meregangkan sarkomer otot jantung ke panjang optimal untuk kontraksi lebih kuat.", options: ["Stroke Volume akan menurun drastis", "Stroke Volume akan meningkat karena regangan otot jantung yang optimal", "Heart rate akan langsung menurun", "Afterload akan meningkat tajam", "Kontraktilitas akan dihambat"], source: "PPT 1 - Mekanisme Kerja Jantung" },
            { q: "Faktor Afterload mengacu pada apa dalam mekanika jantung?", a: "Tahanan atau resistensi vaskuler yang harus dilawan ventrikel untuk menyemprotkan darah", desc: "Afterload sebagian besar ditentukan oleh tekanan darah arteri perifer dan resistensi pembuluh darah yang harus dilewati.", options: ["Volume darah di akhir diastol", "Tahanan atau resistensi vaskuler yang harus dilawan ventrikel untuk menyemprotkan darah", "Kapasitas vena menampung darah", "Kecepatan depolarisasi SA node", "Tekanan osmotik di dalam plasma darah"], source: "PPT 1 - Mekanisme Kerja Jantung" },
            { q: "Sistem saraf otonom parasimpatis (Nervus Vagus) menurunkan denyut jantung melalui penglepasan neurotransmiter apa?", a: "Asetilkolin (ACh)", desc: "ACh membuka kanal kalium dan memperlambat laju depolarisasi pada SA Node, sehingga memperlambat heart rate.", options: ["Epinefrin", "Asetilkolin (ACh)", "Norepinefrin", "Dopamin", "Glutamat"], source: "PPT 6, 12 - Fungsi Kelistrikan Jantung" },
            { q: "Di manakah letak Baroreseptor utama pengatur tekanan darah secara refleks?", a: "Sinus Karotis dan Arkus Aorta", desc: "Sensor tekanan ini mendeteksi regangan vaskuler akibat perubahan tekanan darah dan mengirim sinyal ke medula oblongata.", options: ["Ventrikel Kanan dan Kiri", "Sinus Karotis dan Arkus Aorta", "Vena Cava Superior", "Medulla Oblongata", "Hipotalamus"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Respons kardiovaskular jika terjadi Hemoragik (perdarahan hebat) yang menurunkan tekanan darah secara mendadak adalah?", a: "Vasokonstriksi perifer dan takikardia simpatis", desc: "Tubuh merespon hipotensi akut dengan meningkatkan tonus simpatis untuk menyempitkan pembuluh darah dan mempercepat denyut jantung.", options: ["Vasodilatasi perifer massif", "Vasokonstriksi perifer dan takikardia simpatis", "Penurunan aktivitas ginjal secara permanen", "Stimulasi parasimpatis dominan", "Penurunan kontraktilitas otot jantung"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Sebagian besar volume darah pada orang dewasa (60-65%) disimpan di bagian sirkulasi mana saat istirahat?", a: "Sistem Vena (Vena Sistemik)", desc: "Vena berfungsi sebagai reservoir (penampung) darah utama karena elastisitas dan kapasitasnya yang besar.", options: ["Jantung", "Sistem Arteri", "Sistem Kapiler", "Sistem Vena (Vena Sistemik)", "Arteri Pulmonalis"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Hormon yang memicu produksi sel darah merah saat terjadi hipoksia jaringan adalah?", a: "Eritropoietin (EPO)", desc: "EPO dilepaskan oleh ginjal dan merangsang sumsum tulang untuk mempercepat eritropoiesis.", options: ["Aldosteron", "Angiotensin II", "Renin", "Eritropoietin (EPO)", "Anti-Diuretik Hormone (ADH)"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Hormon yang dilepaskan otot jantung saat terjadi peregangan diastolik berlebihan untuk membuang cairan adalah?", a: "ANP (Atrial Natriuretic Peptide)", desc: "ANP/BNP menstimulasi ginjal membuang Na+ dan air (diuresis) sehingga volume dan tekanan darah turun.", options: ["ANP (Atrial Natriuretic Peptide)", "ADH (Anti-Diuretic Hormone)", "Aldosteron", "Angiotensin II", "Kortisol"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Enzim Renin dilepaskan oleh ginjal sebagai respons terhadap?", a: "Penurunan tekanan darah / perfusi ginjal", desc: "Renin mengaktifkan jalur Angiotensinogen menjadi Angiotensin I, yang kemudian diubah jadi Angiotensin II untuk menaikkan TD.", options: ["Peningkatan tekanan darah / hipervolemia", "Penurunan tekanan darah / perfusi ginjal", "Peningkatan oksigenasi darah", "Stimulasi nervus vagus", "Peregangan otot jantung"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Angiotensin II memiliki peran sangat kuat dalam sistem kardiovaskular sebagai?", a: "Vasokonstriktor paling poten dan stimulan pelepasan Aldosteron", desc: "Angiotensin II langsung menyempitkan arteriola dan merangsang kelenjar adrenal menahan natrium via Aldosteron.", options: ["Vasodilator perifer utama", "Vasokonstriktor paling poten dan stimulan pelepasan Aldosteron", "Penghambat reabsorpsi cairan di ginjal", "Inhibitor saraf simpatis", "Stimulator sekresi ANP"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },

            // TRANSPORTASI & VASKULER (21-35)
            { q: "Pada Hukum Starling Kapiler, perpindahan cairan kembali masuk (reabsorpsi) ke dalam pembuluh darah di ujung vena bergantung pada?", a: "Tekanan Osmotik Koloid Plasma (BCOP)", desc: "Tekanan Osmotik Koloid Plasma (BCOP) yang dihasilkan oleh protein (Albumin) bertugas menarik cairan agar kembali masuk ke vena kapiler.", options: ["Tekanan Osmotik Koloid Plasma (BCOP)", "Tekanan Hidrostatik Kapiler", "Tekanan Hidrostatik Interstisial", "Tekanan Parsial Oksigen", "Penurunan Tekanan Vena Sentral"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Gaya yang dominan mendorong cairan filtrasi KELUAR dari kapiler menuju ruang interstisial di ujung arteriol adalah?", a: "Tekanan Hidrostatik Darah (CHP)", desc: "Tekanan darah fisik yang dihasilkan dari curah jantung mendorong cairan melewati celah sel endotel kapiler.", options: ["Tekanan Hidrostatik Darah (CHP)", "Tekanan Osmotik Koloid Jaringan", "Tekanan Osmotik Koloid Plasma", "Tekanan Limfatik", "Pompa otot rangka"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Jika kadar albumin plasma darah menurun drastis (hipoalbuminemia), apa komplikasi cairan yang terjadi?", a: "Edema perifer masif", desc: "Tanpa albumin, Tekanan Osmotik Koloid Plasma turun drastis, sehingga cairan yang keluar ke jaringan gagal diserap kembali.", options: ["Dehidrasi jaringan", "Peningkatan reabsorpsi kapiler", "Edema perifer masif", "Hipertensi pulmonal", "Penurunan tekanan hidrostatik"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Arteri manakah di dalam tubuh yang bertugas mengatur 'resistance' (tahanan perifer total) paling dominan?", a: "Arteriola", desc: "Arteriola memiliki otot polos yang tebal di dindingnya dan ukurannya paling krusial mengatur distribusi darah lokal dan TPR.", options: ["Aorta", "Vena Cava", "Kapiler", "Arteriola", "Venula"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Saat olahraga, peningkatan metabolisme otot (Asam Laktat, CO2) menyebabkan sfingter prekapiler mengalami?", a: "Vasodilatasi lokal (membuka lebar)", desc: "Metabolit aktif dan asidosis lokal langsung memicu pelebaran pembuluh darah otot (autoregulasi) agar O2 masuk maksimal.", options: ["Vasokonstriksi lokal", "Penutupan total (iskemia)", "Vasodilatasi lokal (membuka lebar)", "Peningkatan resistensi perifer ganda", "Trombosis mikrovaskuler"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Sirkulasi paru-paru (pulmonal) memiliki karakteristik tekanan yang unik dibandingkan sirkulasi sistemik, yaitu?", a: "Tekanan hidrostatik rendah, memprioritaskan difusi gas", desc: "Sirkulasi pulmonal tekanan rendah mencegah filtrasi cairan ke dalam alveolus (mencegah edema paru) dan melambatkan aliran agar O2 bisa difusi maksimal.", options: ["Tekanan hidrostatik sangat tinggi", "Tekanan onkotik nol", "Tekanan hidrostatik rendah, memprioritaskan difusi gas", "Identik dengan tekanan aorta", "Didominasi oleh resistensi tinggi"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Pembuluh kapiler merupakan struktur vital karena fungsi utamanya adalah?", a: "Satu-satunya tempat terjadinya pertukaran nutrisi, gas, dan limbah", desc: "Kapiler hanya terdiri dari selapis endotel pipih yang ideal untuk difusi gas pasif dan transpor nutrisi.", options: ["Mendistribusikan darah ke seluruh organ tanpa kebocoran", "Satu-satunya tempat terjadinya pertukaran nutrisi, gas, dan limbah", "Menyimpan 60% cadangan darah", "Memompa darah secara peristaltik", "Mengatur denyut jantung lokal"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Hormon Antidiuretik (ADH / Vasopresin) merespons kondisi apa dan apa efeknya?", a: "Merespons osmolaritas plasma tinggi dengan menahan air di ginjal", desc: "ADH dari neurohipofisis mencegah kehilangan air melalui urin, sehingga meningkatkan volume darah dan TD.", options: ["Merespons volume darah tinggi dengan membuang air", "Merespons osmolaritas plasma tinggi dengan menahan air di ginjal", "Merespons hipoksia dengan memproduksi sel darah", "Merespons peregangan atrium dengan vasodilatasi", "Merespons inflamasi kapiler"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Jika terjadi hiperkapnia (kadar CO2 tinggi di jaringan otak), pembuluh darah serebral akan berespons dengan?", a: "Vasodilatasi kuat", desc: "Otak sangat sensitif terhadap pH. Peningkatan CO2 menurunkan pH, memicu pembuluh darah otak melebar untuk membuang CO2 berlebih.", options: ["Vasokonstriksi kuat", "Vasodilatasi kuat", "Tidak ada perubahan", "Menutup total aliran darah", "Membentuk bekuan sementara"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Refleks pengembalian vena (Venous Return) menuju jantung dari bagian bawah tubuh dibantu oleh mekanisme apa?", a: "Pompa otot rangka dan katup vena satu arah", desc: "Vena di kaki melawan gravitasi dengan bantuan kontraksi otot betis (pompa otot) dan katup yang mencegah aliran darah merosot turun.", options: ["Hanya bergantung pada viskositas darah", "Pompa otot rangka dan katup vena satu arah", "Denyutan aorta abdominalis", "Tekanan hidrostatik jaringan yang tinggi", "Hanya bergantung pada daya hisap ventrikel kanan"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Viskositas darah sebagian besar ditentukan oleh?", a: "Rasio sel darah merah terhadap volume plasma (Hematokrit)", desc: "Semakin tinggi hematokrit (sel darah merah padat), semakin kental darah, semakin besar resistensi perifer yang membebani jantung.", options: ["Kadar trombosit dalam darah", "Rasio sel darah merah terhadap volume plasma (Hematokrit)", "Kadar ion natrium plasma", "Kadar albumin plasma murni", "Tingkat tekanan parsial oksigen"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },
            { q: "Tahanan Perifer Total (TPR) adalah hambatan terhadap aliran darah. Jika terjadi vasokonstriksi arteriola massif, maka TPR akan?", a: "Meningkat tajam, menyebabkan tekanan darah arteri naik", desc: "Menyempitnya pembuluh darah meningkatkan resistensi eksponensial terhadap aliran, menyebabkan beban tekanan di belakangnya (arteri) naik drastis.", options: ["Menurun tajam, menyebabkan tekanan darah turun", "Meningkat tajam, menyebabkan tekanan darah arteri naik", "Tidak berubah jika cardiac output tetap", "Hanya mempengaruhi curah jantung parsial", "Meningkatkan filtrasi kapiler secara merata"], source: "PPT 3, 4 - Pengaturan Tekanan Darah" },

            { q: "Sebagian besar Oksigen (98%) diangkut dari paru ke jaringan perifer dalam bentuk?", a: "Terikat pada besi (Heme) di Hemoglobin", desc: "Oksigen sangat sulit larut dalam air/plasma murni (hanya 2%). Sisanya terikat reversibel membentuk Oksihemoglobin.", options: ["Terlarut bebas dalam plasma plasma", "Terikat pada besi (Heme) di Hemoglobin", "Dalam bentuk ion Superoksida", "Terikat pada rantai Asam Amino Hb", "Dikonversi menjadi air di kapiler"], source: "PPT 8, 9 - Fisiologi Respirasi" },

            { q: "Sebagian Karbondioksida (30%) diangkut menempel secara langsung pada protein globin Hemoglobin. Bentuk ikatan ini disebut?", a: "Karbaminohemoglobin", desc: "CO2 berikatan dengan gugus asam amino pada rantai globin (bukan di posisi heme besi tempat O2 menempel).", options: ["Oksihemoglobin", "Karboksihemoglobin", "Methemoglobin", "Karbaminohemoglobin", "Ion Bikarbonat"], source: "PPT 8, 9 - Fisiologi Respirasi" },
            { q: "Berdasarkan Efek Bohr, faktor apa yang menyebabkan kurva disosiasi Oksihemoglobin bergeser ke KANAN (afinitas O2 turun)?", a: "Peningkatan kadar CO2, Suhu, dan Penurunan pH", desc: "Kurva yang bergeser ke KANAN menandakan Hemoglobin (Hb) mulai 'melepaskan' daya cengkeramnya terhadap Oksigen, menguntungkan otot yang sedang aktif.", options: ["Peningkatan kadar CO2, Suhu, dan Penurunan pH", "Penurunan suhu lingkungan dan Alkalosis", "Penurunan 2,3-DPG dan Peningkatan pH", "Hanya bergantung pada penurunan pO2", "Peningkatan konsentrasi Bikarbonat"], source: "PPT 8, 9 - Fisiologi Respirasi" },
            { q: "Volume udara masuk dan keluar paru-paru dalam satu siklus pernapasan normal tanpa paksaan (sekitar 500 ml) disebut?", a: "Volume Tidal (VT)", desc: "Volume Tidal adalah ukuran pernapasan basal kita saat istirahat santai.", options: ["Volume Residu (RV)", "Volume Tidal (VT)", "Kapasitas Vital (VC)", "Kapasitas Paru Total (TLC)", "Volume Cadangan Inspirasi"], source: "PPT 8, 9 - Fisiologi Respirasi" },
            { q: "Volume udara yang tetap mengendap di dalam paru-paru bahkan setelah ekspirasi (menghembuskan napas) sekuat tenaga disebut?", a: "Volume Residu (RV)", desc: "Sisa udara sekitar 1200ml ini mustahil dikeluarkan, berfungsi vital menjaga alveolus agar tidak lengket/kolaps total.", options: ["Volume Residu (RV)", "Volume Tidal (VT)", "Kapasitas Vital (VC)", "Volume Cadangan Ekspirasi (ERV)", "Kapasitas Residu Fungsional (FRC)"], source: "PPT 8, 9 - Fisiologi Respirasi" },
            { q: "Volume maksimal udara yang bisa dihembuskan keluar secara paksa setelah kita menarik napas secara maksimal pula dinamakan?", a: "Kapasitas Vital (Vital Capacity / VC)", desc: "Kapasitas Vital adalah penjumlahan dari Volume Cadangan Inspirasi + Volume Tidal + Volume Cadangan Ekspirasi.", options: ["Kapasitas Paru Total (TLC)", "Kapasitas Residu Fungsional (FRC)", "Kapasitas Vital (Vital Capacity / VC)", "Volume Residu (RV)", "Volume Tidal Cadangan"], source: "PPT 8, 9 - Fisiologi Respirasi" },

            { q: "Di manakah letak Pusat Pernapasan Ritmik (Pusat Kontrol Respirasi) utama di susunan saraf pusat?", a: "Medula Oblongata dan Pons", desc: "Batang otak memiliki grup respirasi dorsal dan ventral (medula) serta pneumotaksik/apneustik (pons) pengatur otomatis napas.", options: ["Korteks Serebri", "Hipotalamus", "Cerebellum", "Medula Oblongata dan Pons", "Thalamus"], source: "PPT 19 - Mekanika Kardiorespirasi" },
            { q: "Stimulus kimiawi paling kuat yang mendominasi aktivasi kemoreseptor sentral di otak untuk memacu hiperventilasi adalah?", a: "Peningkatan pCO2 arteri yang membentuk ion Hidrogen (H+) di cairan serebrospinal", desc: "Kemoreseptor sentral buta terhadap oksigen. Ia sangat peka mendeteksi CO2 yang menembus sawar darah otak lalu berubah wujud jadi asam (H+).", options: ["Penurunan ekstrim Oksigen arteri (pO2)", "Peningkatan Asam Laktat di sirkulasi otot", "Peningkatan pCO2 arteri yang membentuk ion Hidrogen (H+) di cairan serebrospinal", "Penurunan drastis Glukosa darah", "Peningkatan Bikarbonat ginjal"], source: "PPT 19 - Mekanika Kardiorespirasi" },

            { q: "Apa dampak pergeseran kurva disosiasi oksihemoglobin ke arah KIRI terhadap transpor Oksigen?", a: "Hemoglobin mengikat Oksigen sangat kuat, sulit melepaskannya ke jaringan", desc: "Keadaan alkalosis, suhu dingin, atau PCO2 rendah akan menggeser kurva ke kiri, sangat baik mengikat O2 di paru tapi buruk saat melepasnya ke organ.", options: ["Hemoglobin sangat mudah melepaskan Oksigen ke jaringan", "Hemoglobin berhenti mengikat Oksigen", "Hemoglobin mengikat Oksigen sangat kuat, sulit melepaskannya ke jaringan", "Terjadi pertukaran Oksigen dengan Karbondioksida di darah", "Jumlah Volume Tidal akan langsung meningkat tajam"], source: "PPT 8, 9 - Fisiologi Respirasi" },

            { q: "Parameter fisiologis terbaik untuk menilai kapasitas kardiorespirasi dan kerja maksimal aerobik pada atlet adalah?", a: "Konsumsi Oksigen Maksimal (VO2 Max)", desc: "VO2 Max adalah metrik puncak yang menilai kemampuan tubuh menghirup, mendistribusi, dan mengkonsumsi O2 murni per menit di tingkat sel otot.", options: ["Konsumsi Oksigen Maksimal (VO2 Max)", "Curah Jantung Maksimal (Max CO)", "Kapasitas Vital Paru-paru", "Stroke Volume (Isi Sekuncup)", "Saturasi Oksigen Perifer"], source: "PPT 19 - Mekanika Kardiorespirasi" },

        ];

                                        'Regulasi TD melibatkan Baroreseptor di Sinus Karotis dan Arkus Aorta yang memberikan umpan balik ke Medulla. Respon hormonal meliputi rilis ADH (menahan air), Angiotensin II (vasokonstriksi kuat), dan Eritropoietin (EPO) saat hipoksia. Di tingkat kapiler, Tekanan Hidrostatik mendorong filtrasi keluar, sementara Tekanan Osmotik Koloid (Onkotik) yang dihasilkan protein plasma (Albumin) menarik cairan kembali ke lumen.'}

                                        ${!isLengkap ? 
                                        'Respirasi bertujuan menyediakan O2 dan membuang CO2. Zona konduksi (hidung-trakea) menyaring udara, sementara alveolus menjadi tempat difusi. Transpor O2 mayoritas terikat Hemoglobin, sedangkan CO2 mayoritas dalam bentuk ion Bikarbonat.' : 
                                        'Struktur pernapasan dibagi menjadi Zona Konduksi (Dead Space) dan Zona Respirasi (Difusi). Difusi gas di membran alveol-kapiler bersifat pasif mengikuti gradien tekanan parsial. Afinitas Hemoglobin terhadap O2 dipengaruhi oleh suhu, pH, dan pCO2 (Efek Bohr). Peningkatan metabolit di jaringan menggeser kurva disosiasi ke kanan untuk mempermudah pelepasan oksigen. CO2 diangkut sebagai Bikarbonat (60%), Karbamino-Hb (30%), dan terlarut (10%).'}
                                    </p>
                                    <span class="citation-tag">Sumber: PPT 8, 9 - Fisiologi Respirasi</span>
                                </div>
                                <div class="order-1 md:order-2">
                                    <h4 class="font-black text-blue-400 uppercase text-xs mb-3">Integrasi Kardiorespirasi & Olahraga</h4>
                                    <p class="text-sm leading-relaxed">
                                        ${!isLengkap ? 
                                        'Sistem pernapasan berkoordinasi dengan jantung di tingkat SSP (Pons & Medulla). Saat olahraga, VO2 Max mencerminkan kapasitas aerobik maksimal. Ventilasi meningkat untuk menjaga PCO2 normal dan meminimalisir asidosis laktat.' : 
                                        'Koordinasi kardiorespirasi terjadi di batang otak, di mana stimulasi kemoreseptor oleh kenaikan PCO2 arteri memicu peningkatan ventilasi dan aktivitas simpatis jantung. Selama latihan fisik, VO2 Max (Maximal Oxygen Consumption) adalah indikator kebugaran terbaik. Atlet terlatih menjaga ventilasi alveolar dengan menaikkan Volume Tidal (kedalaman napas) daripada frekuensi pernapasan untuk efisiensi maksimal kerja pernapasan.'}
                                    </p>
                                    <span class="citation-tag">Sumber: PPT 19 - Mekanika Kardiorespirasi</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchRMode(mode) {
            state.ringkasanMode = mode;
            renderContent();
        }

        function renderKuisMenu(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-4xl mx-auto animate-in zoom-in-95 duration-500">
                    <div onclick="startKuis('askteri')" class="glass p-14 cursor-pointer hover:bg-red-500/10 transition group text-center border-l-8 border-red-500">
                        <h3 class="text-4xl font-black mb-3 text-red-500 uppercase tracking-tighter">ASKTERI</h3>
                        <p class="text-[10px] uppercase opacity-40 font-black tracking-[0.2em]">60 Multiple Choice Questions</p>
                    </div>
                    <div onclick="startKuis('sandisk')" class="glass p-14 cursor-pointer hover:bg-blue-500/10 transition group text-center border-r-8 border-blue-500">
                        <h3 class="text-4xl font-black mb-3 text-blue-500 uppercase tracking-tighter">SANDISK VENA</h3>
                        <p class="text-[10px] uppercase opacity-40 font-black tracking-[0.2em]">Medical Flashcards</p>
                    </div>
                </div>
            `;
        }

        function startKuis(type) {
            const area = document.getElementById('dynamic-content');
            if(type === 'askteri') renderAskteri(area, 0);
            else renderSandisk(area, 0);
            lucide.createIcons();
        }

        // ASKTERI RENDERER
        function renderAskteri(container, index) {
            const q = quizData[index];
            container.innerHTML = `
                <div class="glass p-12 max-w-3xl mx-auto shadow-2xl border-t-2 border-red-500">
                    <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
                        <span class="text-xs font-black uppercase opacity-40 tracking-widest text-red-400">Askteri Mode</span>
                        <span class="text-sm font-black bg-white/10 px-4 py-1 rounded-full">${index+1} / 60</span>
                    </div>
                    <h2 class="text-2xl font-black mb-10 leading-snug">${q.q}</h2>
                    <div class="space-y-4">
                        ${q.options.map((opt, i) => `
                            <button onclick="handleAskteriSave(${index}, '${opt}')" class="w-full text-left glass p-6 hover:bg-white/10 transition border border-white/5 font-bold text-lg ${state.answers[index] === opt ? 'bg-white/20' : ''}">
                                <span class="text-red-500 mr-5 font-black opacity-60">${String.fromCharCode(65+i)}</span> ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div class="flex justify-between mt-14 pt-8 border-t border-white/5">
                        <button onclick="${index > 0 ? `renderAskteri(document.getElementById('dynamic-content'), ${index-1})` : `renderKuisMenu(document.getElementById('dynamic-content'))`}" class="text-xs font-black uppercase opacity-40 hover:opacity-100 transition">Kembali</button>
                        ${index === 59 ? 
                        `<button onclick="finishKuis()" class="bg-red-600 px-12 py-3 rounded-full font-black uppercase text-sm shadow-[0_0_30px_rgba(220,38,38,0.5)]">Hitung Skor</button>` :
                        `<button onclick="renderAskteri(document.getElementById('dynamic-content'), ${index+1})" class="bg-white/10 px-12 py-3 rounded-full font-black uppercase text-sm hover:bg-white/20 transition">Lanjut</button>`}
                    </div>
                </div>
            `;
        }

        function handleAskteriSave(idx, val) {
            state.answers[idx] = val;
            renderAskteri(document.getElementById('dynamic-content'), idx);
        }

        function finishKuis() {
            let score = 0;
            quizData.forEach((q, i) => { if(state.answers[i] === q.a) score++; });
            const p = (score / 60) * 100;
            let res = { t: "", e: "" };

            if(p <= 25) res = { t: "hypo oksigen tuh", e: "😵" };
            else if(p <= 55) res = { t: "kamu kurang oksigen tuhh", e: "😮‍💨" };
            else if(p <= 85) res = { t: "oksigen mu pas!", e: "😊" };
            else res = { t: "over oksigen yess!", e: "🤩" };

            const area = document.getElementById('dynamic-content');
            area.innerHTML = `
                <div class="glass p-16 text-center max-w-3xl mx-auto border-t-4 border-red-500">
                    <div class="text-8xl mb-8">${res.e}</div>
                    <h2 class="text-7xl font-black mb-2">${score} / 60</h2>
                    <p class="text-2xl font-black text-red-500 uppercase tracking-[0.2em] mb-12">${res.t}</p>
                    
                    <div class="space-y-6 text-left max-h-[400px] overflow-y-auto pr-6 custom-scroll mb-12">
                        ${quizData.map((q, i) => `
                            <div class="glass p-6 border-l-4 ${state.answers[i] === q.a ? 'border-blue-500' : 'border-red-500'} bg-white/5">
                                <p class="text-sm font-black mb-2">${i+1}. ${q.q}</p>
                                <div class="flex flex-wrap gap-x-4 gap-y-1 mb-2">
                                    <span class="text-[10px] font-bold uppercase ${state.answers[i] === q.a ? 'text-blue-400' : 'text-red-400'}">Anda: ${state.answers[i] || 'KOSONG'}</span>
                                    <span class="text-[10px] font-bold uppercase text-green-400">Kunci: ${q.a}</span>
                                </div>
                                <p class="text-[10px] opacity-40 italic">${q.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="goHome()" class="bg-white/10 px-14 py-4 rounded-full font-black uppercase text-xs hover:bg-white/20">Return Home</button>
                </div>
            `;
        }

        // FLASHCARD RENDERER
        function renderSandisk(container, index) {
            const q = quizData[index];
            container.innerHTML = `
                <div class="max-w-2xl mx-auto flex flex-col items-center animate-in fade-in duration-500">
                    <div class="card-container w-full mb-12">
                        <div class="card" id="card-${index}" onclick="this.classList.toggle('flipped')">
                            <!-- DEPAN -->
                            <div class="card-face glass border-t-4 border-blue-500">
                                <span class="text-[10px] font-black uppercase opacity-20 absolute top-8 tracking-[0.3em]">Flashcard Question</span>
                                <h3 class="text-2xl font-black leading-tight px-6">${q.q}</h3>
                                <p class="text-[10px] opacity-30 mt-12 italic uppercase tracking-widest font-bold">Tap to see Answer</p>
                            </div>
                            <!-- BELAKANG -->
                            <div class="card-face card-back">
                                <span class="text-[10px] font-black uppercase opacity-20 absolute top-8 tracking-[0.3em]">Core Answer</span>
                                <h3 class="text-4xl font-black text-orange-400 mb-8 drop-shadow-lg text-center">${q.a}</h3>
                                <div class="bg-black/40 p-6 rounded-2xl text-sm leading-relaxed text-gray-200 border border-white/5">
                                    ${q.desc}
                                </div>
                                <span class="text-[9px] opacity-20 mt-8 font-bold">${q.source}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-14 glass px-10 py-4 rounded-full">
                        <button onclick="${index > 0 ? `renderSandisk(document.getElementById('dynamic-content'), ${index-1})` : `renderKuisMenu(document.getElementById('dynamic-content'))`}" class="opacity-40 hover:opacity-100 transition hover:scale-125"><i data-lucide="arrow-left"></i></button>
                        <span class="text-xs font-black tracking-widest opacity-30">${index+1} / 60</span>
                        <button onclick="${index < 59 ? `renderSandisk(document.getElementById('dynamic-content'), ${index+1})` : `renderKuisMenu(document.getElementById('dynamic-content'))`}" class="opacity-40 hover:opacity-100 transition hover:scale-125"><i data-lucide="arrow-right"></i></button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // TRAINING MODE RENDERER
        function renderTraining(container, index) {
            const q = quizData[index];
            const isAns = state.answers[index] !== null;
            const isUserCorrect = state.answers[index] === q.a;
            
            let explanationBoxStyle = "";
            let explanationIcon = "";
            let explanationTitleColor = "";
            
            if(isAns) {
                if(isUserCorrect) {
                    // Glowing Biru
                    explanationBoxStyle = "bg-blue-900/30 border-l-8 border-blue-500 shadow-[0_0_30px_rgba(59,130,246,0.2)]";
                    explanationIcon = "✔️ TEPAT! -";
                    explanationTitleColor = "text-blue-400 drop-shadow-md";
                } else {
                    // Glowing Merah
                    explanationBoxStyle = "bg-red-900/30 border-l-8 border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.2)]";
                    explanationIcon = "❌ KURANG TEPAT! -";
                    explanationTitleColor = "text-red-400 drop-shadow-md";
                }
            }

            container.innerHTML = `
                <div class="glass p-12 max-w-3xl mx-auto animate-in slide-in-from-right-8 duration-500 border-t-2 border-orange-500">
                    <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
                        <span class="text-xs font-black uppercase opacity-40 tracking-widest text-orange-400">Training Mode (Live Feedback)</span>
                        <span class="text-sm font-black">${index+1} / 60</span>
                    </div>
                    <h2 class="text-2xl font-black mb-10 leading-snug">${q.q}</h2>
                    <div class="space-y-4">
                        ${q.options.map((opt, i) => {
                            let btnCls = "border-white/5 hover:bg-white/10 opacity-100";
                            
                            if(isAns) {
                                if(opt === q.a) {
                                    // Kunci Benar: GLOW BIRU
                                    btnCls = "bg-blue-600/90 border-blue-400 shadow-[0_0_25px_rgba(59,130,246,0.9)] scale-[1.03] z-10 text-white";
                                } else if(opt === state.answers[index]) {
                                    // Jawaban User Salah: GLOW MERAH
                                    btnCls = "bg-red-600/90 border-red-400 shadow-[0_0_25px_rgba(239,68,68,0.9)] scale-[1.03] z-10 text-white";
                                } else {
                                    // Sisa
                                    btnCls = "opacity-20 grayscale border-white/5";
                                }
                            }

                            return `
                                <button onclick="saveTraining(${index}, '${opt}')" ${isAns ? 'disabled' : ''} class="w-full text-left glass p-6 transition-all duration-300 border font-bold text-lg ${btnCls}">
                                    <span class="text-orange-500 mr-5 font-black ${isAns && (opt === q.a || opt === state.answers[index]) ? 'text-white' : ''}">${String.fromCharCode(65+i)}</span> ${opt}
                                </button>
                            `;
                        }).join('')}
                    </div>

                    ${isAns ? `
                        <div class="mt-12 p-8 rounded-r-3xl animate-in fade-in zoom-in-95 duration-500 ${explanationBoxStyle}">
                            <p class="text-[13px] font-black mb-3 uppercase tracking-wider ${explanationTitleColor}">
                                ${explanationIcon} Penjelasan Evaluasi:
                            </p>
                            <p class="text-[15px] text-gray-100 font-medium leading-relaxed tracking-wide">${q.desc}</p>
                            <p class="text-[9px] mt-6 opacity-40 font-black uppercase tracking-widest">${q.source}</p>
                        </div>
                    ` : ''}

                    <div class="flex justify-between mt-12 pt-8 border-t border-white/5">
                        <button onclick="${index > 0 ? `renderTraining(document.getElementById('dynamic-content'), ${index-1})` : ''}" class="opacity-40 uppercase font-black text-xs hover:opacity-100 transition ${index === 0 ? 'invisible' : ''}">Prev</button>
                        <button onclick="${index < 59 ? `renderTraining(document.getElementById('dynamic-content'), ${index+1})` : ''}" class="bg-white/10 px-12 py-3 rounded-full font-black uppercase text-sm hover:bg-white/20 transition ${index === 59 ? 'invisible' : ''}">Next</button>
                    </div>
                </div>
            `;
        }

        function saveTraining(idx, val) {
            state.answers[idx] = val;
            renderTraining(document.getElementById('dynamic-content'), idx);
        }

        // Init Lucide
        lucide.createIcons();
    </script>
</body>
</html>
