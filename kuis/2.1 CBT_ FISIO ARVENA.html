<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identify ARVENA</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --venous-dark: #021114;
            --venous-teal: #06343b;
            --venous-light: #0d6b77;
            --venous-cyan: #15b0c4;
        }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--venous-dark);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Gradient Mesh Animation Effect */
        .mesh-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(135deg, var(--venous-dark) 0%, #031c21 100%);
        }
        .blob {
            position: absolute;
            filter: blur(90px);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 12s infinite ease-in-out alternate;
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--venous-teal); }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--venous-light); animation-delay: -4s; animation-direction: alternate-reverse;}
        .blob-3 { top: 40%; left: 20%; width: 40vw; height: 40vw; background: #084852; animation-duration: 18s; }
        .blob-4 { bottom: 20%; left: 60%; width: 35vw; height: 35vw; background: var(--venous-cyan); opacity: 0.3; animation-delay: -8s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(10%, 15%) scale(1.1); }
        }

        /* Glassmorphism Styles */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-btn {
            background: rgba(21, 176, 196, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(21, 176, 196, 0.3);
            transition: all 0.3s ease;
        }
        .glass-btn:hover {
            background: rgba(21, 176, 196, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(21, 176, 196, 0.5);
        }

        /* Flashcard Styles */
        .flashcard-scene {
            perspective: 1500px;
            width: 100%;
            height: 400px;
        }
        .flashcard {
            width: 100%;
            height: 100%;
            transition: transform 0.7s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
        }
        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }
        .flashcard-face {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            text-align: center;
        }
        .flashcard-back {
            transform: rotateY(180deg);
            background: rgba(6, 52, 59, 0.95);
            border: 1px solid rgba(21, 176, 196, 0.5);
            box-shadow: 0 15px 35px -10px rgba(0,0,0,0.6);
            overflow-y: auto;
        }

        /* Fade Animation for View Transition */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: var(--venous-light); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--venous-cyan); }
    </style>
</head>
<body>

    <!-- Gradient Mesh Background -->
    <div class="mesh-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <!-- Main Container -->
    <div id="app" class="relative z-10 w-full min-h-screen flex flex-col items-center justify-center p-4 md:p-8">
        <!-- Content gets injected here by JavaScript -->
    </div>

    <script>
        // --- DATA Q&A (Pretest & Posttest) ---
        const qaData = [
            {
                q: "Rata-rata tekanan darah dipengaruhi langsung oleh:",
                options: [
                    "Curah jantung dan total resistensi perifer",
                    "Curah jantung dan stroke volume",
                    "Jari-jari dan panjang pembuluh",
                    "Darah balik dan pompa respirasi",
                    "Saraf otonom"
                ],
                ans: 0
            },
            {
                q: "Curah jantung (CO) dapat dicari melalui perhitungan:",
                options: [
                    "TPR x SP",
                    "SV x HR",
                    "Lama Waktu x 100",
                    "Diastole x Sistole",
                    "VCE + VR"
                ],
                ans: 1
            },
            {
                q: "Pada Uji Korotkoff, tekanan diastole mulai ditentukan saat bunyi ada di fase/urutan:",
                options: ["1", "2", "3", "4", "5"],
                ans: 4
            },
            {
                q: "Faktor yang memengaruhi kontrol vasokontriktor lokal menurut data kuis:",
                options: [
                    "Pompa respirasi",
                    "Aliran darah",
                    "Simpatis-parasimpatis",
                    "Katup jantung",
                    "Jari-jari pembuluh darah"
                ],
                ans: 2
            },
            {
                q: "Volume udara yang masih berada di paru setelah ekspirasi maksimal disebut?",
                options: [
                    "Volume tidal",
                    "Volume cadangan inspirasi",
                    "Kapasitas vital",
                    "Volume residu",
                    "Kapasitas paru total"
                ],
                ans: 3
            },
            {
                q: "Pernyataan A: Bunyi hilang saat tekanan manset dibawah tekanan diastolik. Pernyataan B: Menjadi aliran laminar. Hubungannya?",
                options: [
                    "A benar, B salah, tidak berhubungan",
                    "A salah, B benar, tidak berhubungan",
                    "A benar, B benar, Berhubungan",
                    "A benar, B benar, tidak berhubungan",
                    "A salah, B salah, Berhubungan"
                ],
                ans: 2
            },
            {
                q: "Faktor vaskular yang mempengaruhi aliran darah, KECUALI:",
                options: [
                    "Gerakan pompa jantung",
                    "Volume darah",
                    "Viskositas darah",
                    "Denyut jantung",
                    "Elastisitas dinding pembuluh"
                ],
                ans: 3
            },
            {
                q: "Di bawah ini yang BUKAN termasuk indikasi pemeriksaan spirometri adalah:",
                options: [
                    "Batuk kronis > 40 tahun",
                    "Riwayat penyakit paru",
                    "Kardiovaskular tidak stabil",
                    "Sakit dada",
                    "Clubbing finger"
                ],
                ans: 2
            },
            {
                q: "Seseorang memeriksa tekanan darahnya dan mendapatkan nilai 130/85 mmHg. Interpretasinya adalah:",
                options: [
                    "Normal",
                    "Elevated",
                    "Hipertensi Stage 2",
                    "Hipertensi darurat",
                    "Hipertensi Stage 1"
                ],
                ans: 4
            },
            {
                q: "Kapasitas residu fungsional (KRF) didapatkan dari penjumlahan:",
                options: [
                    "Volume Cadangan Ekspirasi + Volume Residu",
                    "Volume Cadangan Inspirasi + Volume Tidal",
                    "Kapasitas Vital + Volume Residu",
                    "Volume Tidal + Volume Cadangan Ekspirasi",
                    "Volume Inspirasi + Ekspirasi"
                ],
                ans: 0
            }
        ];

        // --- DATA FLASHCARDS ---
        const flashcardData = [
            {
                front: "Sebutkan 3 faktor utama yang mempengaruhi akurasi pengukuran tekanan darah!",
                back: "1. Berbicara / mendengar aktif (Naik 10/10 mmHg)<br>2. Menahan kencing (Naik 15/10 mmHg)<br>3. Manset terlalu kecil atau terhalang pakaian"
            },
            {
                front: "Bagaimana Klasifikasi Tekanan Darah menurut pedoman AHA/JNC?",
                back: "<ul class='list-disc list-inside text-left inline-block text-sm md:text-base'><li><strong>Normal:</strong> < 120 dan < 80</li><li><strong>Elevated:</strong> 120-129 dan < 80</li><li><strong>Stage 1:</strong> 130-139 atau 80-89</li><li><strong>Stage 2:</strong> ≥ 140 atau ≥ 90</li><li><strong>Krisis Hipertensi:</strong> > 180 dan/atau > 120</li></ul>"
            },
            {
                front: "Apa pengertian dari Spirometri?",
                back: "Pemeriksaan untuk <strong>mengukur volume udara dan aliran/kecepatan udara</strong> yang dihirup dan dihembuskan oleh paru-paru, guna mendeteksi gangguan fungsi pernapasan (obstruksi/restriksi)."
            },
            {
                front: "Sebutkan Siklus Pemeriksaan SVC (Kapasitas Vital Paru)!",
                back: "Start &rarr; Bernapas biasa &rarr; Beep &rarr; <strong>Ekspirasi maksimal</strong> &rarr; <strong>Inspirasi maksimal</strong> &rarr; <strong>Ekspirasi maksimal</strong> &rarr; Napas biasa (3x) &rarr; Stop."
            },
            {
                front: "Sebutkan Siklus Pemeriksaan FVC (Kapasitas Vital Paksa)!",
                back: "Start &rarr; <strong>Inspirasi maksimal</strong> &rarr; <strong>Ekspirasi maksimal secara kuat dan dipaksa</strong> (selama minimal 6 detik) &rarr; Stop."
            },
            {
                front: "Apa saja Kontraindikasi dari pemeriksaan Spirometri?",
                back: "<ul class='list-disc list-inside text-left inline-block text-sm'><li>Hemoptisis (Batuk Darah)</li><li>Pneumotoraks</li><li>Status kardiovaskular tidak stabil</li><li>Infark miokard & Emboli paru</li><li>Aneurisma serebri/toraks</li><li>Pasca bedah mata & Kecemasan (mual/vertigo)</li></ul>"
            },
            {
                front: "Sebutkan Kriteria Acceptability & Reproducibility Spirometri!",
                back: "<strong>Acceptability:</strong><br>1. Permulaan uji baik hingga selesai.<br>2. Ekspirasi min 6 detik.<br>3. Grafik puncak bebas artefak.<br><br><strong>Reproducibility:</strong><br>Dilakukan 3x percobaan, selisih 2 nilai FVC & FEV1 terbesar <5% atau <100mL."
            },
            {
                front: "Jelaskan fase-fase bunyi Korotkoff!",
                back: "<strong>Fase 1:</strong> Tajam, tapping (Sistolik)<br><strong>Fase 2:</strong> Lebih lembut<br><strong>Fase 3:</strong> Nyaring dan lebih keras<br><strong>Fase 4:</strong> Lembut, seperti teredam<br><strong>Fase 5:</strong> Hilang / terdapat aliran laminar (Diastolik)"
            },
            {
                front: "Bagaimana interpretasi nilai Indeks 50 pada Harvard Step Test?",
                back: "<strong class='text-red-300 text-2xl'>Kesanggupan Kurang</strong><br><br><span class='text-sm'>(< 55 jika memakai cara lambat, atau < 50 jika memakai cara cepat).</span>"
            },
            {
                front: "Jelaskan mekanisme Valsava Maneuver terhadap Tekanan Darah!",
                back: "Ekspirasi paksa dengan glotis tertutup &rarr; Tekanan intratoraks naik &rarr; Aliran balik vena terhambat &rarr; Volume darah ke jantung turun (CO turun) &rarr; Tekanan Darah Menurun."
            }
        ];

        // --- STATE MANAGEMENT ---
        let state = {
            view: 'home', 
            quizIndex: 0,
            quizScore: 0,
            quizAnswered: false,
            flashcardIndex: 0,
            flashcardFlipped: false
        };

        const appContainer = document.getElementById('app');

        // --- RENDER FUNCTIONS ---
        function render() {
            appContainer.innerHTML = ''; 
            const wrapper = document.createElement('div');
            wrapper.className = 'w-full max-w-5xl w-full fade-in flex flex-col items-center justify-center mx-auto';

            switch (state.view) {
                case 'home': wrapper.innerHTML = renderHome(); break;
                case 'materi': wrapper.innerHTML = renderMateri(); break;
                case 'extract': wrapper.innerHTML = renderExtract(); break;
                case 'ringkasan': wrapper.innerHTML = renderRingkasan(); break;
                case 'penjelasan': wrapper.innerHTML = renderPenjelasan(); break;
                case 'training': wrapper.innerHTML = renderTraining(); break;
                case 'adventure': wrapper.innerHTML = renderAdventure(); break;
                case 'war': wrapper.innerHTML = renderWar(); break;
                case 'sandisk': wrapper.innerHTML = renderSandisk(); break;
                case 'war-result': wrapper.innerHTML = renderWarResult(); break;
            }
            appContainer.appendChild(wrapper);
            attachEventListeners();
        }

        function setView(newView) {
            state.view = newView;
            if(newView === 'training' || newView === 'war') {
                state.quizIndex = 0;
                state.quizScore = 0;
                state.quizAnswered = false;
            }
            if(newView === 'sandisk') {
                state.flashcardIndex = 0;
                state.flashcardFlipped = false;
            }
            render();
        }

        // --- HTML TEMPLATES ---
        function getHeader(title) {
            return `
                <div class="text-center mb-10 w-full mt-4">
                    <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-4 drop-shadow-lg text-transparent bg-clip-text bg-gradient-to-r from-teal-200 to-cyan-400">
                        ${title}
                    </h1>
                    <div class="h-1 w-24 bg-gradient-to-r from-teal-400 to-cyan-500 mx-auto rounded-full shadow-lg"></div>
                </div>
            `;
        }

        function renderHome() {
            return `
                ${getHeader('Identify ARVENA')}
                <p class="text-lg md:text-xl text-teal-100 mb-10 text-center font-medium opacity-90">Sistem Eksplorasi Fisiologi Paru & Kardiovaskular</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
                    <button data-view="materi" class="glass-btn rounded-2xl p-8 text-center flex flex-col items-center justify-center group h-64">
                        <svg class="w-16 h-16 mb-4 text-teal-300 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                        <span class="text-2xl font-bold text-white tracking-wide">Mode Materi</span>
                        <span class="text-sm text-teal-200 mt-2">Pelajari ringkasan dan penjelasan lengkap</span>
                    </button>
                    <button data-view="extract" class="glass-btn rounded-2xl p-8 text-center flex flex-col items-center justify-center group h-64">
                        <svg class="w-16 h-16 mb-4 text-cyan-300 group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        <span class="text-2xl font-bold text-white tracking-wide">Mode Extract</span>
                        <span class="text-sm text-cyan-100 mt-2">Uji kemampuan dengan Kuis & Flashcards</span>
                    </button>
                </div>
            `;
        }

        function renderMateri() {
            return `
                ${getHeader('Mode Materi')}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl mb-8">
                    <button data-view="ringkasan" class="glass-btn rounded-2xl p-6 text-center group">
                        <span class="text-xl font-bold text-teal-100 block mb-2">Ringkasan</span>
                        <span class="text-sm text-teal-300">Intisari penting dari modul & PPT</span>
                    </button>
                    <button data-view="penjelasan" class="glass-btn rounded-2xl p-6 text-center group">
                        <span class="text-xl font-bold text-cyan-100 block mb-2">Penjelasan Lengkap</span>
                        <span class="text-sm text-cyan-300">Teori mendetail dan mekanisme fisiologi</span>
                    </button>
                </div>
                <button data-view="home" class="px-6 py-2 rounded-full border border-teal-500 text-teal-300 hover:bg-teal-500 hover:text-white transition-colors">Kembali ke Home</button>
            `;
        }

        function renderExtract() {
            return `
                ${getHeader('Mode Extract')}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl mb-8">
                    <button data-view="training" class="glass-btn rounded-2xl p-6 text-center group">
                        <span class="text-xl font-bold text-teal-100 block mb-2">Mode Training</span>
                        <span class="text-sm text-teal-300">Latihan Soal dengan feedback instan</span>
                    </button>
                    <button data-view="adventure" class="glass-btn rounded-2xl p-6 text-center group">
                        <span class="text-xl font-bold text-cyan-100 block mb-2">Mode Adventure</span>
                        <span class="text-sm text-cyan-300">Masuk ke arena ujian dan ingatan</span>
                    </button>
                </div>
                <button data-view="home" class="px-6 py-2 rounded-full border border-teal-500 text-teal-300 hover:bg-teal-500 hover:text-white transition-colors">Kembali ke Home</button>
            `;
        }

        function renderAdventure() {
            return `
                ${getHeader('Mode Adventure')}
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl mb-8">
                    <button data-view="war" class="glass-btn rounded-2xl p-6 text-center group">
                        <span class="text-xl font-bold text-teal-100 block mb-2">Arvena War</span>
                        <span class="text-sm text-teal-300">Uji Pre/Post Test tanpa ampun (Skor di akhir)</span>
                    </button>
                    <button data-view="sandisk" class="glass-btn rounded-2xl p-6 text-center group">
                        <span class="text-xl font-bold text-cyan-100 block mb-2">Sandisk Arvena</span>
                        <span class="text-sm text-cyan-300">Mode Flashcard untuk hafalan cepat</span>
                    </button>
                </div>
                <button data-view="extract" class="px-6 py-2 rounded-full border border-teal-500 text-teal-300 hover:bg-teal-500 hover:text-white transition-colors">Kembali ke Extract</button>
            `;
        }

        // --- MATERI CONTENT ---
        function renderRingkasan() {
            return `
                <div class="glass p-8 rounded-3xl w-full max-w-4xl mb-8 max-h-[70vh] overflow-y-auto">
                    <h2 class="text-2xl font-bold text-teal-300 mb-4 border-b border-teal-500/30 pb-2">Ringkasan Fisiologi Blok 2.1</h2>
                    <ul class="list-disc list-inside space-y-4 text-teal-50 leading-relaxed text-sm md:text-base">
                        <li><strong class="text-cyan-200">Tekanan Darah (TD):</strong> Dipengaruhi langsung oleh Curah Jantung (CO) & Total Resistensi Perifer (TPR). Formula utama: <span class="text-teal-200 font-mono bg-teal-900/50 px-2 py-1 rounded">MAP = CO x TPR</span> dan <span class="text-teal-200 font-mono bg-teal-900/50 px-2 py-1 rounded">CO = SV x HR</span>.</li>
                        <li><strong class="text-cyan-200">Faktor Vaskular TD:</strong> Dipengaruhi oleh pompa jantung, volume darah, viskositas darah, dan elastisitas pembuluh darah.</li>
                        <li><strong class="text-cyan-200">Pengukuran Auskultasi (Korotkoff):</strong> Aliran laminar adalah aliran lurus normal (tanpa suara). Aliran turbulen memunculkan bunyi saat pembuluh tertekan sebagian. Fase 1 menandai Sistolik, Fase 5 (bunyi hilang) menandai Diastolik.</li>
                        <li><strong class="text-cyan-200">Pengaruh Posisi & Aktivitas:</strong> Saat berdiri terjadi hipotensi ortostatik yang dikompensasi tubuh sehingga TD naik. Kerja otot/otak dan stress meningkatkan kebutuhan O2 dan memicu sekresi hormon yang menaikkan TD. Manuver Valsava (ekspirasi paksa tahan napas) menurunkan venous return sehingga TD sesaat menurun.</li>
                        <li><strong class="text-cyan-200">Harvard Step Test:</strong> Mengukur kesanggupan kardiovaskular. Dipengaruhi oleh genetik, umur, jenis kelamin, aktivitas, lemak, rokok. Terdiri dari rumus lambat dan cepat. Indeks < 50 (Cara Cepat) diartikan kesanggupan kurang.</li>
                        <li><strong class="text-cyan-200">Spirometri:</strong> Tes fungsi paru untuk menilai volume & kecepatan udara. Digunakan untuk membedakan kelainan obstruksi (PPOK, Asma -> FEV1/FVC turun < 75%) dan restriksi (Fibrosis -> FVC turun, rasio normal/tinggi). Kriteria pentingnya adalah <em>Acceptability</em> (awal baik, min 6 detik, tanpa artefak) dan <em>Reproducibility</em>.</li>
                        <li><strong class="text-cyan-200">Kapasitas Residu Fungsional (KRF):</strong> Udara tersisa pasca ekspirasi normal. <span class="text-teal-200 font-mono bg-teal-900/50 px-2 py-1 rounded">KRF = VCE + VR</span>.</li>
                    </ul>
                </div>
                <button data-view="materi" class="px-6 py-2 rounded-full border border-teal-500 text-teal-300 hover:bg-teal-500 hover:text-white transition-colors">Kembali</button>
            `;
        }

        function renderPenjelasan() {
            return `
                <div class="glass p-6 md:p-10 rounded-3xl w-full max-w-5xl mb-8 max-h-[80vh] overflow-y-auto">
                    <h2 class="text-3xl font-extrabold text-teal-300 mb-6 border-b border-teal-500/30 pb-4 sticky top-0 bg-venous-dark/80 backdrop-blur-md z-10 pt-2">Penjelasan Lengkap Modul Fisiologi</h2>
                    
                    <div class="space-y-10 text-teal-50 leading-relaxed">
                        
                        <!-- BAGIAN 1: KARDIOVASKULAR -->
                        <section>
                            <h3 class="text-2xl font-bold text-cyan-300 mb-3 flex items-center"><span class="bg-cyan-900/50 px-3 py-1 rounded-lg mr-3 text-cyan-400">1</span> Kardiovaskular & Tekanan Darah</h3>
                            <p class="mb-3">Tekanan darah arteri rata-rata (MAP) diatur ketat untuk perfusi organ. Faktor utamanya adalah:</p>
                            <ul class="list-disc list-inside ml-4 space-y-1 mb-4">

                    <div class="flex items-center justify-between w-full px-4 mt-2">
                        <button id="prevFlashBtn" class="px-6 py-3 rounded-full border-2 border-teal-600 text-teal-300 hover:bg-teal-600 hover:text-white font-bold transition-colors disabled:opacity-20 disabled:hover:bg-transparent disabled:hover:text-teal-300" ${state.flashcardIndex === 0 ? 'disabled' : ''}>&larr; SEBELUMNYA</button>
                        
                        <button data-view="adventure" class="text-sm font-bold text-red-400 hover:text-red-300 transition-colors uppercase tracking-widest">EXIT</button>

                        <button id="nextFlashBtn" class="px-6 py-3 rounded-full bg-gradient-to-r from-cyan-600 to-teal-500 text-white hover:from-cyan-500 hover:to-teal-400 font-bold shadow-lg transition-all disabled:opacity-20 disabled:grayscale" ${state.flashcardIndex === flashcardData.length - 1 ? 'disabled' : ''}>SELANJUTNYA &rarr;</button>
                    </div>
                </div>
            `;
        }

        // --- EVENT DELEGATION & LISTENERS ---
        function attachEventListeners() {
            const container = document.getElementById('app');
            
            const viewButtons = container.querySelectorAll('[data-view]');
            viewButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation(); 
                    setView(btn.getAttribute('data-view'));
                });
            });

            const trainOpts = container.querySelectorAll('.opt-btn-train');
            trainOpts.forEach(btn => {
                btn.addEventListener('click', () => {
                    handleTrainingOptionClick(parseInt(btn.getAttribute('data-idx')), btn);
                });
            });

            const nextTrain = document.getElementById('nextTrainBtn');
            if (nextTrain) {
                nextTrain.addEventListener('click', () => {
                    state.quizIndex++;
                    state.quizAnswered = false;
                    render();
                });
            }

            const warOpts = container.querySelectorAll('.opt-btn-war');
            warOpts.forEach(btn => {
                btn.addEventListener('click', () => {
                    handleWarOptionClick(parseInt(btn.getAttribute('data-idx')), btn);
                });
            });

            // FLASHCARD FLIP CLICK EVENT
            const flashcardScene = document.getElementById('flashcard-scene');
            if(flashcardScene) {
                const flashcard = document.getElementById('flashcard');
                flashcardScene.addEventListener('click', () => {
                    state.flashcardFlipped = !state.flashcardFlipped;
                    flashcard.classList.toggle('is-flipped', state.flashcardFlipped);
                });
            }
            
            const prevFlash = document.getElementById('prevFlashBtn');
            const nextFlash = document.getElementById('nextFlashBtn');
            
            if(prevFlash) {
                prevFlash.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(state.flashcardIndex > 0) {
                        state.flashcardIndex--;
                        state.flashcardFlipped = false;
                        render();
                    }
                });
            }
            if(nextFlash) {
                nextFlash.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if(state.flashcardIndex < flashcardData.length - 1) {
                        state.flashcardIndex++;
                        state.flashcardFlipped = false;
                        render();
                    }
                });
            }
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
