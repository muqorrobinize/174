<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FISIOLOGI ARVENA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --life-force-bg: #1a0000;
            --life-force-red: #990000;
            --life-force-crimson: #cc2200;
            --life-force-orange: #ff4500;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--life-force-bg);
            color: #f8f8f8;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Gradient Mesh Animation */
        .gradient-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, var(--life-force-red) 0%, transparent 45%),
                        radial-gradient(circle at 90% 80%, var(--life-force-crimson) 0%, transparent 45%),
                        radial-gradient(circle at 50% 50%, #4a0000 0%, transparent 50%),
                        radial-gradient(circle at 80% 10%, var(--life-force-orange) 0%, transparent 35%);
            background-size: 200% 200%;
            animation: meshMove 12s ease infinite alternate;
        }

        @keyframes meshMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .floating-icon {
            position: absolute;
            font-size: 4rem;
            opacity: 0.08;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .title-doctor {
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 10px 20px;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .musthofa-style { background: linear-gradient(90deg, #cc2200, transparent); border-left: 6px solid #fff; }
        .susi-style { background: linear-gradient(270deg, #0066cc, transparent); border-right: 6px solid #fff; text-align: right; width: 100%; }

        /* Flashcard Logic */
        .card-container { perspective: 1200px; }
        .card {
            width: 100%; height: 420px;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px; border-radius: 24px;
        }
        .card-back { transform: rotateY(180deg); background: rgba(20, 0, 0, 0.8); border: 2px solid var(--life-force-orange); }

        .btn-active { background: var(--life-force-crimson) !important; color: white !important; box-shadow: 0 0 20px rgba(204, 34, 0, 0.4); }

        .nav-return {
            position: fixed;
            top: 25px; left: 25px;
            z-index: 100;
            transition: all 0.3s ease;
        }
        .nav-return:hover { transform: translateX(-5px); filter: brightness(1.2); }

        .citation-tag {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
            margin-top: 8px;
            display: block;
        }
    </style>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

    <div class="gradient-mesh"></div>

    <!-- Floating Background Icons -->
    <div class="floating-icon" style="top: 10%; left: 5%;">🫀</div>
    <div class="floating-icon" style="top: 60%; left: 85%; animation-delay: 3s;">🫁</div>
    <div class="floating-icon" style="top: 80%; left: 15%; animation-delay: 6s;">🩸</div>
    <div class="floating-icon" style="top: 30%; left: 75%; animation-delay: 1s;">🩺</div>

    <!-- Return Button -->
    <div id="return-btn" class="nav-return hidden" onclick="goHome()">
        <div class="glass p-3 flex items-center space-x-3 cursor-pointer">
            <i data-lucide="chevron-left" class="w-6 h-6 text-white"></i>
            <span class="text-xs font-black uppercase tracking-widest">Menu Utama</span>
        </div>
    </div>

    <div class="container mx-auto px-4 py-16 relative z-10 min-h-screen">
        <!-- Main Landing -->
        <div id="landing-view">
            <header class="text-center mb-20 animate-in fade-in zoom-in duration-700">
                <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter text-white drop-shadow-2xl">FISIOLOGI ARVENA</h1>
                <div class="w-32 h-1 bg-gradient-to-r from-transparent via-red-500 to-transparent mx-auto mb-4"></div>
                <p class="text-gray-400 font-bold uppercase tracking-[0.4em] text-xs">Medical Cardiorespiratory Hub</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-6xl mx-auto">
                <div onclick="showView('ringkasan')" class="glass p-12 cursor-pointer hover:bg-white/10 transition group text-center border-b-4 border-red-600">
                    <i data-lucide="book-open-check" class="w-12 h-12 mx-auto mb-6 opacity-40 group-hover:opacity-100 transition duration-500"></i>
                    <h3 class="text-3xl font-black mb-3 uppercase tracking-tight">Ringkasan</h3>
                    <p class="text-[10px] opacity-30 uppercase font-bold tracking-widest">Core Medical Theory</p>
                </div>
                <div onclick="showView('kuis')" class="glass p-12 cursor-pointer hover:bg-white/10 transition group text-center border-b-4 border-crimson-600">
                    <i data-lucide="brain" class="w-12 h-12 mx-auto mb-6 opacity-40 group-hover:opacity-100 transition duration-500"></i>
                    <h3 class="text-3xl font-black mb-3 uppercase tracking-tight">Kuis</h3>
                    <p class="text-[10px] opacity-30 uppercase font-bold tracking-widest">Knowledge Testing</p>
                </div>
                <div onclick="showView('training')" class="glass p-12 cursor-pointer hover:bg-white/10 transition group text-center border-b-4 border-orange-600">
                    <i data-lucide="zap" class="w-12 h-12 mx-auto mb-6 opacity-40 group-hover:opacity-100 transition duration-500"></i>
                    <h3 class="text-3xl font-black mb-3 uppercase tracking-tight">Training</h3>
                    <p class="text-[10px] opacity-30 uppercase font-bold tracking-widest">Real-time Feedback</p>
                </div>
            </div>
        </div>

        <!-- Dynamic Content -->
        <div id="dynamic-content" class="hidden"></div>
    </div>

    <script>
        // --- DATASET (Extracted from PDF details) ---
        const questionPool = [
            { q: "Apa inisiator kelistrikan utama jantung yang memiliki ritme intrinsik 80-100 bpm?", a: "Sinoatrial (SA) Node", desc: "SA Node adalah pacemaker primer. Jika gagal, AV node (40-60 bpm) atau Purkinje (15-40 bpm) akan mengambil alih.", options: ["SA Node", "AV Node", "Bundle of His", "Purkinje", "Bachmann Bundle"], source: "PPT 6, 12 - Fungsi Kelistrikan" },
            { q: "Hormon yang dilepaskan atrium saat terjadi peregangan berlebih untuk menurunkan tekanan darah?", a: "ANP (Atrial Natriuretic Peptide)", desc: "ANP/BNP berfungsi mengurangi stressor jantung dengan meningkatkan ekskresi Na+ dan air di ginjal.", options: ["ANP", "ADH", "Aldosteron", "Angiotensin II", "Renin"], source: "PPT 3, 4 - Pengaturan TD" },
            { q: "Bunyi jantung 'Lubb' (S1) terjadi secara mekanis karena?", a: "Penutupan katup Atrioventrikular", desc: "Terjadi di awal sistol ventrikel ketika tekanan ventrikel melampaui tekanan atrium.", options: ["Penutupan katup AV", "Penutupan katup Semilunar", "Pembukaan katup Aorta", "Relaksasi Ventrikel", "Aliran balik Vena"], source: "PPT 1 - Mekanisme Kerja Jantung" },
            { q: "Transpor CO2 dalam darah paling banyak (60%) dalam bentuk?", a: "Ion Bikarbonat (HCO3-)", desc: "Terbentuk melalui reaksi CO2 + H2O <-> H2CO3 <-> H+ + HCO3- yang dikatalisis karbonik anhidrase.", options: ["Bikarbonat", "Karbamino-Hb", "Terlarut Plasma", "Asam Karbonat", "Karboksi-Hb"], source: "PPT 8, 9 - Fisiologi Respirasi" },
            { q: "Perpindahan cairan keluar dari kapiler ke ruang interstisial didorong oleh?", a: "Tekanan Hidrostatik Kapiler", desc: "Hukum Starling kapiler: Hidrostatik mendorong keluar, Osmotik Koloid (Onkotik) plasma menarik masuk.", options: ["Tekanan Hidrostatik", "Tekanan Onkotik", "Tekanan Osmotik", "Tekanan Atmosfer", "Tekanan Intrapleura"], source: "PPT 18 - Fungsi Transportasi" },
            { q: "Efek Bohr menjelaskan bahwa afinitas Hb terhadap O2 menurun (kurva geser kanan) jika?", a: "Peningkatan CO2 dan Suhu", desc: "Kondisi asidosis, peningkatan CO2, suhu, dan 2,3-DPG mempermudah pelepasan O2 ke jaringan.", options: ["Peningkatan CO2 & Suhu", "Penurunan pH", "Penurunan Suhu", "Peningkatan pH", "Penurunan pCO2"], source: "PPT 8, 9 - Fisiologi Respirasi" },
            { q: "Volume udara yang tersisa di paru setelah ekspirasi maksimal disebut?", a: "Volume Residu (RV)", desc: "RV penting untuk mencegah kolapsnya alveoli dan menjaga difusi gas kontinu.", options: ["Volume Residu", "Volume Tidal", "Kapasitas Vital", "Volume Cadangan", "Ruang Mati"], source: "PPT 8, 9 - Fisiologi Respirasi" },
            { q: "Parameter terbaik untuk mengukur kapasitas kerja dinamik kardiorespirasi adalah?", a: "VO2 Max", desc: "VO2 Max mencerminkan kapasitas maksimal pengambilan, transpor, dan penggunaan oksigen.", options: ["VO2 Max", "Cardiac Output", "Vital Capacity", "Stroke Volume", "Respiratory Rate"], source: "PPT 19 - Mekanika Kardiorespirasi" }
        ];

        let quizData = [];
        for(let i=0; i<60; i++) quizData.push({...questionPool[i % questionPool.length], id: i});

        let state = {
            view: 'home',
            answers: new Array(60).fill(null),
            ringkasanMode: 'ringkas'
        };

        function showView(view) {
            state.view = view;
            document.getElementById('landing-view').classList.add('hidden');
            document.getElementById('return-btn').classList.remove('hidden');
            const area = document.getElementById('dynamic-content');
            area.classList.remove('hidden');
            renderContent();
            lucide.createIcons();
        }

        function goHome() {
            state.view = 'home';
            state.answers = new Array(60).fill(null);
            document.getElementById('landing-view').classList.remove('hidden');
            document.getElementById('return-btn').classList.add('hidden');
            document.getElementById('dynamic-content').classList.add('hidden');
        }

        function renderContent() {
            const area = document.getElementById('dynamic-content');
            area.innerHTML = '';
            if(state.view === 'ringkasan') renderRingkasan(area);
            if(state.view === 'kuis') renderKuisMenu(area);
            if(state.view === 'training') renderTraining(area, 0);
        }

        // --- SUB-MENU RENDERS ---

        function renderRingkasan(container) {
            const isLengkap = state.ringkasanMode === 'lengkap';
            container.innerHTML = `
                <div class="max-w-5xl mx-auto animate-in slide-in-from-bottom-8 duration-700">
                    <div class="flex justify-center space-x-4 mb-10">
                        <button onclick="switchRMode('ringkas')" class="glass px-6 py-2 text-xs font-black uppercase ${!isLengkap ? 'btn-active' : ''}">Mode Ringkasan</button>
                        <button onclick="switchRMode('lengkap')" class="glass px-6 py-2 text-xs font-black uppercase ${isLengkap ? 'btn-active' : ''}">Penjelasan Lengkap</button>
                    </div>

                    <div class="grid grid-cols-1 gap-12 mb-20">
                        <!-- MUSTHOFA SECTION -->
                        <div class="glass p-10 border-l-8 border-red-600">
                            <h2 class="title-doctor musthofa-style text-3xl">Dr. Musthofa: Kardiovaskular & Transport</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 text-gray-200">
                                <div>
                                    <h4 class="font-black text-red-500 uppercase text-xs mb-3">Mekanisme Pompa & Siklus Jantung</h4>
                                    <p class="text-sm leading-relaxed">
                                        ${!isLengkap ? 
                                        'Jantung bekerja melalui koordinasi sistolik (kontraksi/ejeksi) dan diastolik (relaksasi/pengisian). Perpindahan darah dipicu oleh gradien tekanan dan dijamin satu arah oleh empat katup utama (AV & Semilunar). Curah Jantung (CO) adalah produk dari Heart Rate dan Stroke Volume.' : 
                                        'Siklus jantung diawali dari Potensial Aksi di SA Node. Tekanan ventrikel yang meningkat melampaui tekanan atrium menutup katup AV (S1). Fase kontraksi isovolumetrik berlanjut hingga tekanan ventrikel membuka katup semilunar untuk ejeksi. Stroke Volume (SV) diatur secara intrinsik oleh mekanisme Frank-Starling (preload) dan ekstrinsik oleh kontraktilitas serta afterload. Peningkatan afterload secara mekanis menurunkan Stroke Volume.'}
                                    </p>
                                    <span class="citation-tag">Sumber: PPT 1 - Mekanisme Kerja Jantung & PPT 6, 12 - Fungsi Kelistrikan</span>
                                </div>
                                <div>
                                    <h4 class="font-black text-red-500 uppercase text-xs mb-3">Regulasi Tekanan Darah & Cairan</h4>
                                    <p class="text-sm leading-relaxed">
                                        ${!isLengkap ? 
                                        'Tekanan darah arteri diatur secara neural (refleks baroreseptor) dan hormonal. Sistem vena menampung 60-65% volume darah sebagai reservoir. Perpindahan cairan di kapiler bergantung pada keseimbangan tekanan hidrostatik dan onkotik plasma.' : 
                                        'Regulasi TD melibatkan Baroreseptor di Sinus Karotis dan Arkus Aorta yang memberikan umpan balik ke Medulla. Respon hormonal meliputi rilis ADH (menahan air), Angiotensin II (vasokonstriksi kuat), dan Eritropoietin (EPO) saat hipoksia. Di tingkat kapiler, Tekanan Hidrostatik mendorong filtrasi keluar, sementara Tekanan Osmotik Koloid (Onkotik) yang dihasilkan protein plasma (Albumin) menarik cairan kembali ke lumen.'}
                                    </p>
                                    <span class="citation-tag">Sumber: PPT 3, 4 - Pengaturan TD & PPT 18 - Fungsi Transportasi</span>
                                </div>
                            </div>
                        </div>

                        <!-- SUSI SECTION -->
                        <div class="glass p-10 border-r-8 border-blue-600">
                            <h2 class="title-doctor susi-style text-3xl">Dr. Susi: Mekanika & Fisiologi Respirasi</h2>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-10 text-gray-200 text-right">
                                <div class="order-2 md:order-1">
                                    <h4 class="font-black text-blue-500 uppercase text-xs mb-3">Dinamika Ventilasi & Transpor Gas</h4>
                                    <p class="text-sm leading-relaxed">
                                        ${!isLengkap ? 
                                        'Respirasi bertujuan menyediakan O2 dan membuang CO2. Zona konduksi (hidung-trakea) menyaring udara, sementara alveolus menjadi tempat difusi. Transpor O2 mayoritas terikat Hemoglobin, sedangkan CO2 mayoritas dalam bentuk ion Bikarbonat.' : 
                                        'Struktur pernapasan dibagi menjadi Zona Konduksi (Dead Space) dan Zona Respirasi (Difusi). Difusi gas di membran alveol-kapiler bersifat pasif mengikuti gradien tekanan parsial. Afinitas Hemoglobin terhadap O2 dipengaruhi oleh suhu, pH, dan pCO2 (Efek Bohr). Peningkatan metabolit di jaringan menggeser kurva disosiasi ke kanan untuk mempermudah pelepasan oksigen. CO2 diangkut sebagai Bikarbonat (60%), Karbamino-Hb (30%), dan terlarut (10%).'}
                                    </p>
                                    <span class="citation-tag">Sumber: PPT 8, 9 - Fisiologi Respirasi</span>
                                </div>
                                <div class="order-1 md:order-2">
                                    <h4 class="font-black text-blue-400 uppercase text-xs mb-3">Integrasi Kardiorespirasi & Olahraga</h4>
                                    <p class="text-sm leading-relaxed">
                                        ${!isLengkap ? 
                                        'Sistem pernapasan berkoordinasi dengan jantung di tingkat SSP (Pons & Medulla). Saat olahraga, VO2 Max mencerminkan kapasitas aerobik maksimal. Ventilasi meningkat untuk menjaga PCO2 normal dan meminimalisir asidosis laktat.' : 
                                        'Koordinasi kardiorespirasi terjadi di batang otak, di mana stimulasi kemoreseptor oleh kenaikan PCO2 arteri memicu peningkatan ventilasi dan aktivitas simpatis jantung. Selama latihan fisik, VO2 Max (Maximal Oxygen Consumption) adalah indikator kebugaran terbaik. Atlet terlatih menjaga ventilasi alveolar dengan menaikkan Volume Tidal (kedalaman napas) daripada frekuensi pernapasan untuk efisiensi maksimal kerja pernapasan.'}
                                    </p>
                                    <span class="citation-tag">Sumber: PPT 19 - Mekanika Kardiorespirasi</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function switchRMode(mode) {
            state.ringkasanMode = mode;
            renderContent();
        }

        function renderKuisMenu(container) {
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10 max-w-4xl mx-auto animate-in zoom-in-95 duration-500">
                    <div onclick="startKuis('askteri')" class="glass p-14 cursor-pointer hover:bg-red-500/10 transition group text-center border-l-8 border-red-500">
                        <h3 class="text-4xl font-black mb-3 text-red-500 uppercase tracking-tighter">ASKTERI</h3>
                        <p class="text-[10px] uppercase opacity-40 font-black tracking-[0.2em]">60 Multiple Choice Questions</p>
                    </div>
                    <div onclick="startKuis('sandisk')" class="glass p-14 cursor-pointer hover:bg-blue-500/10 transition group text-center border-r-8 border-blue-500">
                        <h3 class="text-4xl font-black mb-3 text-blue-500 uppercase tracking-tighter">SANDISK VENA</h3>
                        <p class="text-[10px] uppercase opacity-40 font-black tracking-[0.2em]">Medical Flashcards</p>
                    </div>
                </div>
            `;
        }

        function startKuis(type) {
            const area = document.getElementById('dynamic-content');
            if(type === 'askteri') renderAskteri(area, 0);
            else renderSandisk(area, 0);
            lucide.createIcons();
        }

        function renderAskteri(container, index) {
            const q = quizData[index];
            container.innerHTML = `
                <div class="glass p-12 max-w-3xl mx-auto shadow-2xl border-t-2 border-red-500">
                    <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
                        <span class="text-xs font-black uppercase opacity-40 tracking-widest text-red-400">Askteri Mode</span>
                        <span class="text-sm font-black bg-white/10 px-4 py-1 rounded-full">${index+1} / 60</span>
                    </div>
                    <h2 class="text-2xl font-black mb-10 leading-snug">${q.q}</h2>
                    <div class="space-y-4">
                        ${q.options.map((opt, i) => `
                            <button onclick="handleAskteriSave(${index}, '${opt}')" class="w-full text-left glass p-6 hover:bg-white/10 transition border border-white/5 font-bold text-lg ${state.answers[index] === opt ? 'bg-white/20' : ''}">
                                <span class="text-red-500 mr-5 font-black opacity-60">${String.fromCharCode(65+i)}</span> ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div class="flex justify-between mt-14 pt-8 border-t border-white/5">
                        <button onclick="${index > 0 ? `renderAskteri(document.getElementById('dynamic-content'), ${index-1})` : `renderKuisMenu(document.getElementById('dynamic-content'))`}" class="text-xs font-black uppercase opacity-40 hover:opacity-100 transition">Kembali</button>
                        ${index === 59 ? 
                        `<button onclick="finishKuis()" class="bg-red-600 px-12 py-3 rounded-full font-black uppercase text-sm shadow-[0_0_30px_rgba(220,38,38,0.5)]">Hitung Skor</button>` :
                        `<button onclick="renderAskteri(document.getElementById('dynamic-content'), ${index+1})" class="bg-white/10 px-12 py-3 rounded-full font-black uppercase text-sm hover:bg-white/20 transition">Lanjut</button>`}
                    </div>
                </div>
            `;
        }

        function handleAskteriSave(idx, val) {
            state.answers[idx] = val;
            renderAskteri(document.getElementById('dynamic-content'), idx);
        }

        function finishKuis() {
            let score = 0;
            quizData.forEach((q, i) => { if(state.answers[i] === q.a) score++; });
            const p = (score / 60) * 100;
            let res = { t: "", e: "" };

            if(p <= 25) res = { t: "hypo oksigen tuh", e: "😵" };
            else if(p <= 55) res = { t: "kamu kurang oksigen tuhh", e: "😮‍💨" };
            else if(p <= 85) res = { t: "oksigen mu pas!", e: "😊" };
            else res = { t: "over oksigen yess!", e: "🤩" };

            const area = document.getElementById('dynamic-content');
            area.innerHTML = `
                <div class="glass p-16 text-center max-w-3xl mx-auto border-t-4 border-red-500">
                    <div class="text-8xl mb-8">${res.e}</div>
                    <h2 class="text-7xl font-black mb-2">${score} / 60</h2>
                    <p class="text-2xl font-black text-red-500 uppercase tracking-[0.2em] mb-12">${res.t}</p>
                    
                    <div class="space-y-6 text-left max-h-[400px] overflow-y-auto pr-6 custom-scroll mb-12">
                        ${quizData.map((q, i) => `
                            <div class="glass p-6 border-l-4 ${state.answers[i] === q.a ? 'border-blue-500' : 'border-red-500'} bg-white/5">
                                <p class="text-sm font-black mb-2">${i+1}. ${q.q}</p>
                                <div class="flex flex-wrap gap-x-4 gap-y-1 mb-2">
                                    <span class="text-[10px] font-bold uppercase ${state.answers[i] === q.a ? 'text-blue-400' : 'text-red-400'}">Anda: ${state.answers[i] || 'KOSONG'}</span>
                                    <span class="text-[10px] font-bold uppercase text-green-400">Kunci: ${q.a}</span>
                                </div>
                                <p class="text-[10px] opacity-40 italic">${q.desc}</p>
                            </div>
                        `).join('')}
                    </div>
                    <button onclick="goHome()" class="bg-white/10 px-14 py-4 rounded-full font-black uppercase text-xs hover:bg-white/20">Return Home</button>
                </div>
            `;
        }

        function renderSandisk(container, index) {
            const q = quizData[index];
            container.innerHTML = `
                <div class="max-w-2xl mx-auto flex flex-col items-center animate-in fade-in duration-500">
                    <div class="card-container w-full mb-12">
                        <div class="card" id="card-${index}" onclick="this.classList.toggle('flipped')">
                            <!-- DEPAN -->
                            <div class="card-face glass border-t-4 border-blue-500">
                                <span class="text-[10px] font-black uppercase opacity-20 absolute top-8 tracking-[0.3em]">Flashcard Question</span>
                                <h3 class="text-2xl font-black leading-tight px-6">${q.q}</h3>
                                <p class="text-[10px] opacity-30 mt-12 italic uppercase tracking-widest font-bold">Tap to see Answer</p>
                            </div>
                            <!-- BELAKANG -->
                            <div class="card-face card-back">
                                <span class="text-[10px] font-black uppercase opacity-20 absolute top-8 tracking-[0.3em]">Core Answer</span>
                                <h3 class="text-4xl font-black text-orange-400 mb-8 drop-shadow-lg">${q.a}</h3>
                                <div class="bg-black/40 p-6 rounded-2xl text-sm leading-relaxed text-gray-200 border border-white/5">
                                    ${q.desc}
                                </div>
                                <span class="text-[9px] opacity-20 mt-8 font-bold">${q.source}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center space-x-14 glass px-10 py-4 rounded-full">
                        <button onclick="${index > 0 ? `renderSandisk(document.getElementById('dynamic-content'), ${index-1})` : `renderKuisMenu(document.getElementById('dynamic-content'))`}" class="opacity-40 hover:opacity-100 transition hover:scale-125"><i data-lucide="arrow-left"></i></button>
                        <span class="text-xs font-black tracking-widest opacity-30">${index+1} / 60</span>
                        <button onclick="${index < 59 ? `renderSandisk(document.getElementById('dynamic-content'), ${index+1})` : `renderKuisMenu(document.getElementById('dynamic-content'))`}" class="opacity-40 hover:opacity-100 transition hover:scale-125"><i data-lucide="arrow-right"></i></button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        function renderTraining(container, index) {
            const q = quizData[index];
            const isAns = state.answers[index] !== null;
            container.innerHTML = `
                <div class="glass p-12 max-w-3xl mx-auto animate-in slide-in-from-right-8 duration-500 border-t-2 border-orange-500">
                    <div class="flex justify-between items-center mb-10 border-b border-white/10 pb-5">
                        <span class="text-xs font-black uppercase opacity-40 tracking-widest text-orange-400">Training Mode (Instant)</span>
                        <span class="text-sm font-black">${index+1} / 60</span>
                    </div>
                    <h2 class="text-2xl font-black mb-10 leading-snug">${q.q}</h2>
                    <div class="space-y-4">
                        ${q.options.map((opt, i) => {
                            let cls = "border-white/5";
                            if(isAns) {
                                if(opt === q.a) cls = "bg-blue-600 border-blue-400 shadow-lg scale-[1.02] z-10";
                                else if(opt === state.answers[index]) cls = "bg-red-600 border-red-400 opacity-60";
                                else cls = "opacity-20 grayscale";
                            }
                            return `
                                <button onclick="saveTraining(${index}, '${opt}')" ${isAns ? 'disabled' : ''} class="w-full text-left glass p-6 transition border font-bold text-lg ${cls}">
                                    <span class="text-orange-500 mr-5 font-black">${String.fromCharCode(65+i)}</span> ${opt}
                                </button>
                            `;
                        }).join('')}
                    </div>

                    ${isAns ? `
                        <div class="mt-10 p-8 bg-blue-900/20 border-l-8 border-blue-500 rounded-r-3xl animate-in fade-in duration-500">
                            <p class="text-[11px] font-black text-blue-400 mb-2 uppercase tracking-tighter">Penjelasan Medik:</p>
                            <p class="text-sm text-gray-100 font-medium leading-relaxed">${q.desc}</p>
                            <p class="text-[9px] mt-4 opacity-30 font-black">${q.source}</p>
                        </div>
                    ` : ''}

                    <div class="flex justify-between mt-12 pt-8 border-t border-white/5">
                        <button onclick="${index > 0 ? `renderTraining(document.getElementById('dynamic-content'), ${index-1})` : ''}" class="opacity-40 uppercase font-black text-xs hover:opacity-100 transition ${index === 0 ? 'invisible' : ''}">Prev</button>
                        <button onclick="${index < 59 ? `renderTraining(document.getElementById('dynamic-content'), ${index+1})` : ''}" class="bg-white/10 px-12 py-3 rounded-full font-black uppercase text-sm hover:bg-white/20 transition ${index === 59 ? 'invisible' : ''}">Next</button>
                    </div>
                </div>
            `;
        }

        function saveTraining(idx, val) {
            state.answers[idx] = val;
            renderTraining(document.getElementById('dynamic-content'), idx);
        }

        // Init Lucide
        lucide.createIcons();
    </script>
</body>
</html>
