<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Override</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #10b981; font-family: 'Share Tech Mono', monospace; overflow: hidden; }
        
        /* === VAULT DIAL STYLES === */
        .vault-container {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #1a1a1a, #000);
            box-shadow: 
                0 0 30px rgba(16, 185, 129, 0.1),
                inset 0 0 50px rgba(0,0,0,0.8),
                0 0 0 10px #0a0a0a,
                0 0 0 12px #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .dial-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 0.3s ease-out;
        }

        .dial-number {
            position: absolute;
            top: 10px;
            left: 50%;
            transform-origin: 50% 130px; /* Center of rotation relative to number position */
            transform: translateX(-50%);
            font-size: 1.2rem;
            font-weight: bold;
            color: #064e3b;
            text-shadow: 0 0 2px rgba(16, 185, 129, 0.2);
            user-select: none;
        }
        
        .dial-number.active {
            color: #10b981;
            text-shadow: 0 0 10px #10b981;
            font-size: 1.5rem;
        }

        /* Center Knob */
        .dial-knob {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(145deg, #111, #000);
            border: 2px solid #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
            z-index: 10;
            transition: 0.1s;
        }
        .dial-knob:active { transform: scale(0.95); box-shadow: 0 0 5px rgba(16, 185, 129, 0.5); }
        .dial-knob span { font-size: 0.9rem; letter-spacing: 1px; }

        /* Indicator */
        .indicator {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 0; 
            height: 0; 
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 15px solid #ef4444;
            z-index: 20;
            filter: drop-shadow(0 0 5px #ef4444);
        }

        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(4px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }

        .hidden-panel { display: none; opacity: 0; transition: opacity 1s; }
        .visible { display: block; opacity: 1; }
        
        .led { width: 8px; height: 8px; background: #064e3b; border-radius: 50%; margin: 0 2px; }
        .led.on { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .led.err { background: #ef4444; box-shadow: 0 0 5px #ef4444; }
    </style>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body class="h-screen flex flex-col items-center justify-center relative">

    <!-- === LOCK SCREEN === -->
    <div id="lock-screen" class="flex flex-col items-center gap-8">
        <div class="text-center space-y-2">
            <div class="text-2xl tracking-[0.3em] font-bold text-emerald-500">VAULT ACCESS</div>
            <div class="text-[10px] text-emerald-900 tracking-widest">SECURE PROTOCOL V.3</div>
        </div>

        <!-- THE DIAL -->
        <div class="relative">
            <div class="indicator"></div>
            <div class="vault-container" id="vault">
                <div class="dial-ring" id="dial-ring">
                    <!-- JS will inject numbers -->
                </div>
                <button class="dial-knob" onclick="enterNumber()">
                    <span>ENTER</span>
                </button>
            </div>
        </div>

        <!-- CONTROLS -->
        <div class="flex gap-8 items-center">
            <button onclick="rotate(-1)" class="w-16 h-16 rounded-full border border-emerald-900 bg-black hover:bg-emerald-900/30 text-emerald-500 text-2xl flex items-center justify-center transition active:scale-95 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
                ↺
            </button>
            
            <div class="flex flex-col items-center gap-2">
                <div class="text-3xl font-bold font-mono text-white w-16 text-center bg-black border border-emerald-900 rounded p-1 shadow-inner" id="display-num">0</div>
                <div class="flex" id="led-container">
                    <div class="led"></div><div class="led"></div><div class="led"></div><div class="led"></div>
                </div>
            </div>

            <button onclick="rotate(1)" class="w-16 h-16 rounded-full border border-emerald-900 bg-black hover:bg-emerald-900/30 text-emerald-500 text-2xl flex items-center justify-center transition active:scale-95 shadow-[0_0_15px_rgba(0,0,0,0.5)]">
                ↻
            </button>
        </div>
        
        <div id="status" class="text-xs text-emerald-800 font-mono mt-4">SEQUENCE REQUIRED</div>
    </div>

    <!-- === ADMIN PANEL (HIDDEN) === -->
    <div id="admin-panel" class="hidden-panel w-full max-w-md p-8 border border-emerald-900 bg-black/90 rounded-xl backdrop-blur-xl shadow-[0_0_50px_rgba(16,185,129,0.1)]">
        <div class="flex justify-between items-start mb-6 border-b border-emerald-900/50 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-wider">INJECTOR</h1>
                <p class="text-[10px] text-emerald-600">DATABASE MODIFICATION TOOL</p>
            </div>
            <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse mt-2"></div>
        </div>

        <div class="space-y-5">
            <div class="relative group">
                <div class="absolute -inset-0.5 bg-emerald-500/20 rounded-lg blur opacity-0 group-hover:opacity-100 transition duration-1000"></div>
                <input type="text" id="wallet-input" placeholder="0x... / Solana Address" 
                    class="relative w-full bg-black border border-emerald-800 p-4 text-emerald-400 rounded-lg focus:border-emerald-400 focus:outline-none focus:ring-1 focus:ring-emerald-400 font-mono text-sm placeholder-emerald-900">
            </div>
            
            <button onclick="submitWallet()" id="btn-submit"
                class="w-full bg-emerald-600 hover:bg-emerald-500 text-black font-bold py-3 rounded-lg transition-all shadow-[0_0_20px_rgba(16,185,129,0.3)] hover:shadow-[0_0_30px_rgba(16,185,129,0.5)]">
                INJECT TO WHITELIST
            </button>
        </div>

        <div id="log" class="mt-8 text-[10px] text-emerald-600 h-32 overflow-y-auto border border-emerald-900/50 bg-black p-3 font-mono rounded">
            > System Initialized...<br>
            > Waiting for input...
        </div>
        
        <button onclick="location.reload()" class="mt-6 text-[10px] text-red-900 hover:text-red-500 w-full text-center tracking-widest border-t border-emerald-900/30 pt-4">🔒 RE-ENGAGE LOCK</button>
    </div>

    <script>
        // === VAULT LOGIC ===
        const SECRET = [1, 2, 5, 6]; // Sandi Rahasia
        const TOTAL_NUMS = 10; // 0-9
        const STEP_DEG = 360 / TOTAL_NUMS;
        
        let currentIdx = 0; // Posisi saat ini (0-9)
        let userSequence = [];
        
        // Init Dial Numbers
        const dialRing = document.getElementById('dial-ring');
        for (let i = 0; i < TOTAL_NUMS; i++) {
            const num = document.createElement('div');
            num.className = 'dial-number';
            num.innerText = i;
            // Rotasi angka agar mengelilingi pusat
            num.style.transform = `rotate(${i * STEP_DEG}deg) translate(-50%, -115px) rotate(-${i * STEP_DEG}deg)`;
            // Wait, rotation logic for alignment:
            // We rotate the container, numbers stay upright? No, numbers rotate with container.
            // Let's position them relative to center.
            // Simplified positioning:
            num.style.transform = `rotate(${i * STEP_DEG}deg) translateY(-110px) rotate(-${i * STEP_DEG}deg)`; // Counter rotate text
            // Fix positioning origin to center of dial
            num.style.left = '50%';
            num.style.top = '50%';
            num.style.marginTop = '-10px'; // Half height
            num.style.marginLeft = '-10px'; // Half width
            num.style.width = '20px';
            num.style.textAlign = 'center';
            num.style.transformOrigin = 'center'; // Not needed if using translate from center
            // Better positioning:
            // Reset styles
            num.style.position = 'absolute';
            num.style.top = '50%'; 
            num.style.left = '50%';
            num.style.transform = `rotate(${i * STEP_DEG}deg) translate(0, -110px) rotate(-${i * STEP_DEG}deg)`;
            
            dialRing.appendChild(num);
        }

        updateDial();

        function rotate(direction) {
            // direction 1 = Right Button (Clockwise spin? No, usually Next Number)
            // If I press Right, I expect number to go 0 -> 1 -> 2.
            // To bring '1' to top (from '0'), we must rotate Dial COUNTER-CLOCKWISE.
            // So +1 index = -DEG rotation.
            
            currentIdx += direction;
            
            // Wrap around
            if (currentIdx < 0) currentIdx = TOTAL_NUMS - 1;
            if (currentIdx >= TOTAL_NUMS) currentIdx = 0;
            
            updateDial();
        }

        function updateDial() {
            // Rotate ring so currentIdx is at Top (0 deg)
            // Index 0 is at 0deg. Index 1 is at 36deg.
            // To show Index 1 at top, we rotate ring -36deg.
            const rotation = -(currentIdx * STEP_DEG);
            document.getElementById('dial-ring').style.transform = `rotate(${rotation}deg)`;
            
            // Update Display Number
            document.getElementById('display-num').innerText = currentIdx;
            
            // Highlight active number
            document.querySelectorAll('.dial-number').forEach((el, idx) => {
                if (idx === currentIdx) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        function enterNumber() {
            const btn = document.querySelector('.dial-knob');
            
            // Visual Click
            btn.style.transform = 'scale(0.9)';
            setTimeout(() => btn.style.transform = 'scale(1)', 100);

            userSequence.push(currentIdx);
            updateLeds(userSequence.length);

            // Check Sequence
            if (userSequence.length === SECRET.length) {
                checkUnlock();
            }
        }

        function updateLeds(count) {
            const leds = document.querySelectorAll('.led');
            leds.forEach((led, i) => {
                if (i < count) led.classList.add('on');
                else led.classList.remove('on', 'err');
            });
        }

        function checkUnlock() {
            const isMatch = userSequence.every((val, index) => val === SECRET[index]);
            
            if (isMatch) {
                // Success
                document.getElementById('status').innerText = "ACCESS GRANTED";
                document.getElementById('status').style.color = "#10b981";
                setTimeout(unlockPanel, 500);
            } else {
                // Fail
                const vault = document.getElementById('vault');
                const status = document.getElementById('status');
                const leds = document.querySelectorAll('.led');
                
                vault.classList.add('shake');
                status.innerText = "INVALID SEQUENCE";
                status.style.color = "#ef4444";
                
                leds.forEach(l => l.classList.add('err'));

                setTimeout(() => {
                    vault.classList.remove('shake');
                    userSequence = [];
                    updateLeds(0);
                    status.innerText = "SEQUENCE REQUIRED";
                    status.style.color = "";
                    currentIdx = 0;
                    updateDial();
                }, 800);
            }
        }

        function unlockPanel() {
            document.getElementById('lock-screen').style.display = 'none';
            const panel = document.getElementById('admin-panel');
            panel.style.display = 'block';
            setTimeout(() => panel.classList.add('visible'), 50);
        }

        // === ADMIN LOGIC ===
        function log(msg, type="info") {
            const color = type === 'error' ? 'text-red-500' : 'text-emerald-400';
            const box = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            box.innerHTML = `<div class="${color} border-b border-emerald-900/20 pb-1 mb-1">[${time}] > ${msg}</div>` + box.innerHTML;
        }

        async function submitWallet() {
            const input = document.getElementById('wallet-input');
            const btn = document.getElementById('btn-submit');
            const address = input.value.trim();

            if (!address) return log("Error: Address kosong!", "error");

            btn.innerText = "PROCESSING...";
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const res = await fetch('/api/admin-add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ newAddress: address })
                });

                const data = await res.json();

                if (res.ok) {
                    log(`SUCCESS: ${address.substring(0,8)}... authorized.`);
                    log(`Database updated. Total Agents: ${data.total}`);
                    input.value = '';
                } else {
                    log(`FAILED: ${data.error}`, "error");
                }
            } catch (e) {
                log(`NETWORK ERROR: ${e.message}`, "error");
            } finally {
                btn.innerText = "INJECT TO WHITELIST";
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }
    </script>
</body>
</html>
